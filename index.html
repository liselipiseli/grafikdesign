<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafikdesign Referenz</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: #e4e2dc;
    --border-hover: #c8c5bc;
    --text: #1a1917;
    --text-muted: #6b6860;
    --text-faint: #a09d96;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .logo span { color: var(--text-muted); font-weight: 400; }

  .main-wrap { display: flex; min-height: calc(100vh - 56px); }

  .sidebar {
    width: 230px;
    min-width: 230px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.25rem 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }
  .sidebar-section { margin-bottom: 1.5rem; }
  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    padding: 0 1rem;
    margin-bottom: 4px;
  }
  .sidebar-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 7px 1rem;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    text-align: left;
    transition: all 0.12s;
  }
  .sidebar-btn:hover { background: var(--bg); color: var(--text); }
  .sidebar-btn.active { background: var(--accent-bg); color: var(--accent); font-weight: 500; }
  .sidebar-btn .num {
    font-size: 10px;
    font-weight: 600;
    min-width: 20px;
    opacity: 0.55;
  }

  .content { flex: 1; padding: 2rem; max-width: 960px; }

  .search-wrap { position: relative; margin-bottom: 1.5rem; }
  .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text-faint); pointer-events: none; }
  .search-input {
    width: 100%;
    padding: 10px 12px 10px 38px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-faint); }

  .chapter-header { margin-bottom: 1.5rem; }
  .chapter-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .chapter-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem 0.75rem;
    box-shadow: var(--shadow);
    transition: border-color 0.15s;
    display: flex;
    flex-direction: column;
  }
  .card:hover { border-color: var(--border-hover); }
  .card-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    border-radius: 99px;
    margin-bottom: 8px;
    align-self: flex-start;
  }
  .card-icon { font-size: 20px; margin-bottom: 6px; color: var(--text-muted); }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .card-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    white-space: pre-line;
    flex: 1;
  }
  .card-imgs { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .card-imgs img {
    width: 100%;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    display: block;
  }
  .card-imgs img + img { margin-top: 0; }
  .card-footer { display: flex; justify-content: flex-end; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
  .card-del {
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: none;
    font-size: 11px;
    cursor: pointer;
    color: var(--text-faint);
    transition: all 0.12s;
    display: flex; align-items: center; gap: 4px;
  }
  .card-del:hover { border-color: #fca5a5; color: #ef4444; background: #fef2f2; }

  .add-card-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    background: none;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
    margin-bottom: 2rem;
  }
  .add-card-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

  /* Modal */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    padding: 1.5rem;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 1rem; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
  .form-input, .form-textarea, .form-select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 100px; }
  .form-hint { font-size: 11px; color: var(--text-faint); margin-top: 4px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .btn-secondary {
    padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: none; font-size: 13px; cursor: pointer; color: var(--text-muted); font-family: inherit;
  }
  .btn-secondary:hover { background: var(--bg); }
  .btn-primary {
    padding: 8px 16px; border: none; border-radius: var(--radius-sm);
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
  }
  .btn-primary:hover { background: #1d4ed8; }

  /* Adobe tabs */
  .adobe-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .adobe-tab {
    flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); font-size: 13px; font-weight: 500; cursor: pointer;
    color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: all 0.15s; box-shadow: var(--shadow); font-family: inherit;
  }
  .adobe-tab:hover { border-color: var(--border-hover); color: var(--text); }
  .adobe-tab.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
  .adobe-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .dot-ps { background: #31A8FF; }
  .dot-ai { background: #FF9A00; }
  .dot-id { background: #FF3366; }

  .section-label { font-size: 12px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
  .highlight { background: #fef08a; border-radius: 2px; padding: 0 1px; }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-faint); font-size: 14px; }
  .empty i { font-size: 32px; display: block; margin-bottom: 8px; }

  /* Color tags */
  .tag-01 { background:#EEEDFE; color:#3C3489; }
  .tag-02 { background:#E1F5EE; color:#0F6E56; }
  .tag-03 { background:#FAECE7; color:#993C1D; }
  .tag-04 { background:#E6F1FB; color:#185FA5; }
  .tag-05 { background:#FAEEDA; color:#854F0B; }
  .tag-06 { background:#E1F5EE; color:#085041; }
  .tag-07 { background:#FAECE7; color:#712B13; }
  .tag-08 { background:#EEEDFE; color:#26215C; }
  .tag-09 { background:#FBEAF0; color:#993556; }
  .tag-10 { background:#E6F1FB; color:#0C447C; }
  .tag-11 { background:#F1EFE8; color:#5F5E5A; }
  .tag-12 { background:#FAEEDA; color:#633806; }
  .tag-ps  { background:#e0f4ff; color:#0369a1; }
  .tag-ai  { background:#fff7ed; color:#c2410c; }
  .tag-id  { background:#fdf2f8; color:#9d174d; }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .content { padding: 1rem; }
  }
</style>
</head>

let area = 'kurs';
let currentChapter = 'c01';
let currentAdobe = 'ps';
let modalContext = 'kurs';

function loadState() {
  try { return JSON.parse(localStorage.getItem('gd-ref-v2') || '{}'); } catch(e) { return {}; }
}
function saveState(state) { localStorage.setItem('gd-ref-v2', JSON.stringify(state)); }

function getCards(key) {
  const s = loadState();
  return (s.cards && s.cards[key]) ? s.cards[key] : (DEFAULT_CARDS[key] || []);
}
function setCards(key, cards) {
  const s = loadState();
  if (!s.cards) s.cards = {};
  s.cards[key] = cards;
  saveState(s);
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  const nav = document.getElementById('chapterNav');
  nav.innerHTML = '<div class="sidebar-label">Kapitel</div>' +
    CHAPTERS.map(c => `
      <button class="sidebar-btn ${c.id === currentChapter && area==='kurs' ? 'active' : ''}"
        id="sb-${c.id}" onclick="showChapter('${c.id}')">
        <span class="num">${c.num}</span>
        <span style="flex:1;text-align:left;font-size:12px;">${c.title}</span>
      </button>`).join('');
}

// ── Chapter ───────────────────────────────────────────────────────────────────
function showChapter(id) {
  currentChapter = id;
  area = 'kurs';
  document.getElementById('kursView').style.display = '';
  document.getElementById('adobeView').style.display = 'none';
  document.getElementById('areaKurs').classList.add('active');
  document.getElementById('areaAdobe').classList.remove('active');
  clearSearch();
  renderChapter();
  buildSidebar();
}

function renderChapter() {
  const c = CHAPTERS.find(x => x.id === currentChapter);
  const cards = getCards(c.id);
  document.getElementById('chapterTitle').textContent = `${c.num}. ${c.title}`;
  document.getElementById('chapterSub').textContent = cards.length + ' Karten';
  document.getElementById('kursCards').innerHTML = cards.length
    ? cards.map(card => cardHTML(card, c.id)).join('')
    : emptyHTML();
}

// ── Adobe ─────────────────────────────────────────────────────────────────────
function switchArea(a, btn) {
  area = a;
  document.querySelectorAll('.sidebar-btn[id^="area"]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('kursView').style.display = a === 'kurs' ? '' : 'none';
  document.getElementById('adobeView').style.display = a === 'adobe' ? '' : 'none';
  clearSearch();
  if (a === 'adobe') renderAdobe();
  else renderChapter();
  buildSidebar();
}

function switchAdobe(prog, btn) {
  currentAdobe = prog;
  document.querySelectorAll('.adobe-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAdobe();
}

function renderAdobe() {
  const cards = getCards(currentAdobe);
  const label = ADOBE_PROGRAMS[currentAdobe];
  document.getElementById('adobeTitle').textContent = label;
  document.getElementById('adobeSub').textContent = cards.length + ' Karten';
  document.getElementById('adobeCards').innerHTML = cards.length
    ? cards.map(card => cardHTML(card, currentAdobe)).join('')
    : emptyHTML();
}

// ── Card HTML ─────────────────────────────────────────────────────────────────
function cardHTML(card, key) {
  const isChapter = key.startsWith('c');
  const tagClass = isChapter ? `tag-${key.slice(1)}` : `tag-${key}`;
  const tagLabel = isChapter
    ? (CHAPTERS.find(c => c.id === key)?.num || '')
    : ADOBE_PROGRAMS[key] || key;

  const imgs = card.imgs && card.imgs.length
    ? `<div class="card-imgs">${card.imgs.map(u => `<img src="${esc(u)}" alt="" loading="lazy" onerror="this.style.display='none'">`).join('')}</div>`
    : (card.img ? `<div class="card-imgs"><img src="${esc(card.img)}" alt="" loading="lazy" onerror="this.style.display='none'"></div>` : '');

  return `<div class="card" id="card-${card.id}">
    <span class="card-tag ${tagClass}">${tagLabel}</span>
    <div class="card-icon"><i class="ti ${card.icon || 'ti-file'}"></i></div>
    <div class="card-title">${esc(card.title)}</div>
    <div class="card-desc">${esc(card.desc)}</div>
    ${imgs}
    <div class="card-footer">
      <button class="card-del" onclick="deleteCard('${key}','${card.id}')"><i class="ti ti-trash"></i> Löschen</button>
    </div>
  </div>`;
}

function emptyHTML() {
  return '<div class="empty" style="grid-column:1/-1"><i class="ti ti-cards"></i>Noch keine Karten – füge die erste hinzu!</div>';
}

function deleteCard(key, id) {
  if (!confirm('Karte wirklich löschen?')) return;
  setCards(key, getCards(key).filter(c => c.id !== id));
  if (key.startsWith('c')) renderChapter(); else renderAdobe();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(context) {
  modalContext = context;
  document.getElementById('fTitle').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fIcon').value = 'ti-file';
  document.getElementById('fImgs').value = '';
  const cpg = document.getElementById('chapterPickGroup');
  if (context === 'kurs') {
    cpg.style.display = '';
    document.getElementById('fChapter').innerHTML = CHAPTERS.map(c =>
      `<option value="${c.id}" ${c.id===currentChapter?'selected':''}>${c.num} – ${c.title}</option>`).join('');
    document.getElementById('modalTitle').textContent = 'Neue Karte – Kurskapitel';
  } else {
    cpg.style.display = 'none';
    document.getElementById('modalTitle').textContent = `Neue Karte – Adobe ${ADOBE_PROGRAMS[currentAdobe]}`;
  }
  document.getElementById('modalBackdrop').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 50);
}

function closeModal() { document.getElementById('modalBackdrop').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalBackdrop')) closeModal(); }

function saveCard() {
  const title = document.getElementById('fTitle').value.trim();
  const desc = document.getElementById('fDesc').value.trim();
  if (!title || !desc) { alert('Bitte Titel und Beschreibung ausfüllen.'); return; }
  const icon = document.getElementById('fIcon').value.trim() || 'ti-file';
  const imgs = document.getElementById('fImgs').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const key = modalContext === 'kurs' ? document.getElementById('fChapter').value : currentAdobe;
  const card = { id: 'u' + Date.now(), icon, title, desc, imgs };
  setCards(key, [...getCards(key), card]);
  closeModal();
  if (modalContext === 'kurs') { currentChapter = key; renderChapter(); buildSidebar(); }
  else renderAdobe();
}

// ── Search ────────────────────────────────────────────────────────────────────
function allCards() {
  const out = [];
  CHAPTERS.forEach(c => getCards(c.id).forEach(card => out.push({ card, key: c.id })));
  Object.keys(ADOBE_PROGRAMS).forEach(k => getCards(k).forEach(card => out.push({ card, key: k })));
  return out;
}

function doSearch(q) {
  const sv = document.getElementById('searchView');
  if (!q.trim()) { sv.style.display = 'none'; return; }
  sv.style.display = '';
  const results = allCards().filter(({card}) =>
    (card.title + card.desc).toLowerCase().includes(q.toLowerCase())
  );
  document.getElementById('searchLabel').textContent =
    `${results.length} Ergebnis${results.length!==1?'se':''} für „${q}"`;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  const hi = t => esc(t).replace(re, '<span class="highlight">$1</span>');
  const sc = document.getElementById('searchCards');
  if (!results.length) {
    sc.innerHTML = '<div class="empty" style="grid-column:1/-1"><i class="ti ti-search-off"></i>Nichts gefunden.</div>';
  } else {
    sc.innerHTML = results.map(({card, key}) => {
      const isChapter = key.startsWith('c');
      const tagClass = isChapter ? `tag-${key.slice(1)}` : `tag-${key}`;
      const tagLabel = isChapter ? (CHAPTERS.find(c=>c.id===key)?.num||'') : ADOBE_PROGRAMS[key];
      const imgs = card.imgs && card.imgs.length
        ? `<div class="card-imgs">${card.imgs.map(u=>`<img src="${esc(u)}" alt="" loading="lazy" onerror="this.style.display='none'">`).join('')}</div>`
        : '';
      return `<div class="card">
        <span class="card-tag ${tagClass}">${tagLabel}</span>
        <div class="card-icon"><i class="ti ${card.icon||'ti-file'}"></i></div>
        <div class="card-title">${hi(card.title)}</div>
        <div class="card-desc">${hi(card.desc)}</div>
        ${imgs}
      </div>`;
    }).join('');
  }
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchView').style.display = 'none';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildSidebar();
renderChapter();
</script>
</body>
</html>
