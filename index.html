<!DOCTYPE html>
<html lang="de"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafikdesign Referenz</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#fff;--border:#e4e2dc;--border-h:#c8c5bc;
  --text:#1a1917;--muted:#6b6860;--faint:#a09d96;
  --accent:#2563eb;--accent-bg:#eff6ff;
  --r:10px;--rs:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:14px;font-weight:600;letter-spacing:-.01em}
.logo span{color:var(--muted);font-weight:400}

.search-wrap{max-width:680px;margin:1.5rem auto;padding:0 1.5rem;position:relative}
.search-wrap i.si{position:absolute;left:calc(1.5rem + 12px);top:50%;transform:translateY(-50%);font-size:15px;color:var(--faint);pointer-events:none}
.search-input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);font-size:14px;color:var(--text);outline:none;transition:border-color .15s;font-family:inherit}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--faint)}

.page{max-width:680px;margin:0 auto;padding:0 1.5rem 4rem}

.area-switch{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.5rem;background:var(--surface)}
.area-switch button{flex:1;padding:9px 16px;border:none;background:none;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s}
.area-switch button:hover{background:var(--bg)}
.area-switch button.active{background:var(--accent-bg);color:var(--accent)}
.area-switch button+button{border-left:1px solid var(--border)}

/* accordion */
.chapter{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.chapter-head{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .12s}
.chapter-head:hover{background:var(--bg)}
.chapter-num{font-size:11px;font-weight:700;color:var(--faint);min-width:22px}
.chapter-name{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.chapter-count{font-size:11px;color:var(--faint)}
.chevron{font-size:16px;color:var(--faint);transition:transform .2s}
.chapter.open .chevron{transform:rotate(180deg)}
.chapter-body{display:none;border-top:1px solid var(--border);padding:12px}
.chapter.open .chapter-body{display:block}

/* cards */
.cards{display:flex;flex-direction:column;gap:8px}

.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.card-main{padding:12px 14px}
.card-tag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:99px;margin-bottom:7px}
.card-title{font-size:13px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.card-desc{font-size:12px;color:var(--muted);line-height:1.65;white-space:pre-line}

/* image blocks within card */
.card-img-block{border-top:1px solid var(--border);padding:10px 14px}
.card-img-block img{width:100%;border-radius:4px;display:block;border:1px solid var(--border)}
.card-img-caption{font-size:11px;color:var(--faint);margin-top:4px}

.card-foot{display:flex;gap:6px;justify-content:flex-end;padding:8px 14px;border-top:1px solid var(--border);background:var(--surface)}
.foot-btn{padding:3px 9px;border:1px solid var(--border);border-radius:4px;background:none;font-size:11px;cursor:pointer;color:var(--faint);font-family:inherit;display:flex;align-items:center;gap:3px;transition:all .12s}
.foot-btn:hover{border-color:var(--border-h);color:var(--text)}
.foot-btn.del:hover{border-color:#fca5a5;color:#ef4444;background:#fef2f2}

.add-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px dashed var(--border);border-radius:var(--rs);background:none;font-size:12px;cursor:pointer;color:var(--faint);font-family:inherit;margin-top:8px;transition:all .15s;width:100%;justify-content:center}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* adobe */
.adobe-tabs{display:flex;gap:6px;margin-bottom:1rem}
.adobe-tab{flex:1;padding:9px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;transition:all .12s}
.adobe-tab:hover{border-color:var(--border-h)}
.adobe-tab.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-ps{background:#31A8FF}.dot-ai{background:#FF9A00}.dot-id{background:#FF3366}

/* search */
#searchView{display:none}
.search-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-bottom:10px}
.highlight{background:#fef08a;border-radius:2px;padding:0 1px}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--faint);font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:6px}

/* modal */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;align-items:center;justify-content:center;padding:1rem}
.backdrop.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r);box-shadow:0 20px 60px rgba(0,0,0,.18);padding:1.5rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:600;margin-bottom:1.1rem}
.fg{margin-bottom:.9rem}
.fl{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.fi,.ft,.fs{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;color:var(--text);background:var(--surface);outline:none;font-family:inherit;transition:border-color .15s}
.fi:focus,.ft:focus,.fs:focus{border-color:var(--accent)}
.ft{resize:vertical;min-height:90px}
.fh{font-size:11px;color:var(--faint);margin-top:3px}

/* image entry rows in modal */
.img-entries{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.img-row{display:flex;gap:6px;align-items:flex-start}
.img-row .fi{flex:1}
.img-row .ft{flex:1;min-height:50px}
.img-del{padding:7px 9px;border:1px solid var(--border);border-radius:var(--rs);background:none;cursor:pointer;color:var(--faint);font-size:13px;flex-shrink:0;transition:all .12s}
.img-del:hover{border-color:#fca5a5;color:#ef4444;background:#fef2f2}
.add-img-row{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:1px dashed var(--border);border-radius:var(--rs);font-size:12px;cursor:pointer;color:var(--faint);background:none;font-family:inherit;transition:all .12s}
.add-img-row:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

.modal-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:1.1rem}
.btn-s{padding:7px 14px;border:1px solid var(--border);border-radius:var(--rs);background:none;font-size:13px;cursor:pointer;color:var(--muted);font-family:inherit}
.btn-s:hover{background:var(--bg)}
.btn-p{padding:7px 14px;border:none;border-radius:var(--rs);background:var(--accent);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-p:hover{background:#1d4ed8}

/* tags */
.t01{background:#EEEDFE;color:#3C3489}.t02{background:#E1F5EE;color:#0F6E56}
.t03{background:#FAECE7;color:#993C1D}.t04{background:#E6F1FB;color:#185FA5}
.t05{background:#FAEEDA;color:#854F0B}.t06{background:#E1F5EE;color:#085041}
.t07{background:#FAECE7;color:#712B13}.t08{background:#EEEDFE;color:#26215C}
.t09{background:#FBEAF0;color:#993556}.t10{background:#E6F1FB;color:#0C447C}
.t11{background:#F1EFE8;color:#5F5E5A}.t12{background:#FAEEDA;color:#633806}
.tps{background:#e0f4ff;color:#0369a1}.tai{background:#fff7ed;color:#c2410c}.tid{background:#fdf2f8;color:#9d174d}
</style>
</head>
<body>

<header>
  <div class="logo">Grafikdesign <span>Referenz</span></div>
  <div style="font-size:11px;color:var(--faint)">liselipiseli</div>
</header>

<div class="search-wrap">
  <i class="ti ti-search si" aria-hidden="true"></i>
  <input class="search-input" type="text" id="searchInput" placeholder="Begriff suchen – Kerning, Komplementärfarbe, Ebenenmaske …" oninput="doSearch(this.value)">
</div>

<div class="page">
  <div id="searchView">
    <div class="search-label" id="searchLabel"></div>
    <div class="cards" id="searchCards"></div>
  </div>

  <div id="mainView">
    <div class="area-switch">
      <button class="active" onclick="switchArea('kurs',this)"><i class="ti ti-book-2" aria-hidden="true"></i> Kurskapitel</button>
      <button onclick="switchArea('adobe',this)"><i class="ti ti-apps" aria-hidden="true"></i> Adobe Tools</button>
    </div>
    <div id="kursView"></div>
    <div id="adobeView" style="display:none">
      <div class="adobe-tabs">
        <button class="adobe-tab active" onclick="switchAdobe('ps',this)"><span class="dot dot-ps"></span>Photoshop</button>
        <button class="adobe-tab" onclick="switchAdobe('ai',this)"><span class="dot dot-ai"></span>Illustrator</button>
        <button class="adobe-tab" onclick="switchAdobe('id',this)"><span class="dot dot-id"></span>InDesign</button>
      </div>
      <div id="adobeChapters"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="backdrop" id="backdrop" onclick="closeOut(event)">
  <div class="modal">
    <div class="modal-title" id="mTitle">Karte</div>
    <div class="fg"><label class="fl">Titel *</label><input class="fi" type="text" id="fT" placeholder="z. B. Komplementärfarben"></div>
    <div class="fg"><label class="fl">Beschreibung *</label><textarea class="ft" id="fD" rows="5" placeholder="Ausführliche Beschreibung …&#10;Zeilenumbrüche werden übernommen."></textarea></div>
    <div class="fg"><label class="fl">Icon (Tabler-Name)</label><input class="fi" type="text" id="fI" placeholder="ti-palette" value="ti-file"><div class="fh">Optional – Liste: <a href="https://tabler.io/icons" target="_blank" style="color:var(--accent)">tabler.io/icons</a></div></div>
    <div class="fg">
      <label class="fl">Bilder (URL + optionale Bildunterschrift)</label>
      <div class="img-entries" id="imgEntries"></div>
      <button type="button" class="add-img-row" onclick="addImgRow()"><i class="ti ti-plus" aria-hidden="true"></i> Bild hinzufügen</button>
      <div class="fh" style="margin-top:6px">Bilder aus GitHub-Repo oder imgur.com – direkt neben dem Inhalt sichtbar</div>
    </div>
    <div class="fg" id="fCG"><label class="fl">Kapitel</label><select class="fs" id="fC"></select></div>
    <div class="modal-actions">
      <button class="btn-s" onclick="closeModal()">Abbrechen</button>
      <button class="btn-p" onclick="saveCard()">Speichern</button>
    </div>
  </div>
</div>

<script>
const CH=[
  {id:'c01',n:'01',t:'Grundlagen der Gestaltung'},
  {id:'c02',n:'02',t:'Farbe und Farbsysteme'},
  {id:'c03',n:'03',t:'Bild, Bildbearbeitung & KI'},
  {id:'c04',n:'04',t:'Typografie und Schrift'},
  {id:'c05',n:'05',t:'Zeichen, Piktogramme & Icons'},
  {id:'c06',n:'06',t:'Layout und Editorialdesign'},
  {id:'c07',n:'07',t:'Logodesign'},
  {id:'c08',n:'08',t:'Corporate Design'},
  {id:'c09',n:'09',t:'Marketing und Werbung'},
  {id:'c10',n:'10',t:'Screen und Interfacedesign'},
  {id:'c11',n:'11',t:'Designmanagement'},
  {id:'c12',n:'12',t:'Designgeschichte & Abschlussprojekt'},
];
const AP={ps:'Photoshop',ai:'Illustrator',id:'InDesign'};
const TAG={c01:'t01',c02:'t02',c03:'t03',c04:'t04',c05:'t05',c06:'t06',c07:'t07',c08:'t08',c09:'t09',c10:'t10',c11:'t11',c12:'t12',ps:'tps',ai:'tai',id:'tid'};
const TL=k=>k.startsWith('c')?CH.find(c=>c.id===k)?.n:AP[k];

// Default cards – imgs: [{url, caption}]
const DC={
  c01:[
    {id:'d01a',icon:'ti-layout-grid',title:'Gestaltungsprinzipien',desc:'Kontrast, Wiederholung, Ausrichtung, Nähe – die vier Grundprinzipien nach Robin Williams.',imgs:[]},
    {id:'d01b',icon:'ti-eye',title:'Wahrnehmungspsychologie',desc:'Gestaltgesetze: Nähe, Ähnlichkeit, Kontinuität, Geschlossenheit – wie das Auge Gruppen bildet.',imgs:[]},
  ],
  c02:[
    {id:'d02a',icon:'ti-eye',title:'Farbe & Wahrnehmung',desc:'Farbe physikalisch: nur elektromagnetische Strahlung – sichtbares Licht liegt zwischen 380–780 nm\n\nFarbwahrnehmung:\n– Objekte absorbieren/reflektieren Licht → reflektierter Anteil = wahrgenommene Farbe\n– Bsp. Kirsche reflektiert Rot, absorbiert alle anderen Wellenlängen\n\nFarbkonstanz: Zapfen passen sich Helligkeitsbedingungen an\n\nAuge: Stäbchen = Helligkeitswahrnehmung (SW) | Zäpfchen = Farbsehen\n– S-Zapfen = Blau | M-Zapfen = Grün | L-Zapfen = Rot\n\nSehen & wahrnehmen lernen ist ein lebenslanger, aktiver Prozess.\nBewusst sehen = tägliches Training des Grafikdesigners.',imgs:[]},
    {id:'d02b',icon:'ti-palette',title:'RGB vs. CMYK',desc:'RGB – Additive Farbmischung:\n– Lichtfarben: Rot, Grün, Blau\n– Werte 0–255 (8 Bit = 16,7 Mio. Farben)\n– Bildschirm, Beamer, Kamera, Scanner\n– Alle voll → Weiß | keine → Schwarz\n\nCMYK – Subtraktive Farbmischung:\n– Körperfarben: Cyan, Magenta, Yellow + Schwarz (K)\n– Werte 0–100 %\n– Druckerzeugnisse aller Art\n– Schwarz extra, da Mischung nur Braunton ergibt\n\nRGB-Farbraum ist größer als CMYK → nicht alle RGB-Farben druckbar\nEmpfehlung: Farbdefinition von CMYK ausgehend erstellen\n\nBildschirm = RGB | Druck = CMYK – von Anfang an festlegen!',imgs:[]},
    {id:'d02c',icon:'ti-history',title:'Geschichte der Farbenlehre',desc:'Newton (1642–1727):\n– Prisma zerlegt Sonnenlicht → 7 Hauptfarben\n– Erster Farbkreis: verband Violett mit Rot\n– Schwarz & Weiß nicht enthalten\n\nGoethe (1749–1832):\n– Schwerpunkt psychologische Wirkung\n– Farbe = Grenzphänomen zwischen Hell und Dunkel\n– Grundfarben: Rot (Purpur), Gelb, Blau\n– Komplementärfarben stehen sich gegenüber\n\nItten (1888–1967):\n– 12 Farben auf Basis Rot, Blau, Gelb\n– Primär → Sekundär → Tertiärfarben\n– Komplementärfarben = diametral gegenüber, besonders harmonisch\n\nKüppers (geb. 1928):\n– 8 Grundfarben basierend auf den 3 Zapfentypen OGV\n– Farbsechseck mit 6 Komplementärpaaren\n– Rhomboeder-Farbraum: 3D-Vektormodell\n→ Für Gestaltung Küppers dem symmetrischen Farbkreis vorziehen!',imgs:[]},
    {id:'d02d',icon:'ti-drop',title:'Farbwirkung & Psychologie',desc:'Jede Farbe hat positive & negative Assoziationen.\nKontext entscheidet über Bedeutung.\n\nReaktionszeit: Gelb → Weiß → Rot → Grün → Blau (Gelb am schnellsten!)\nWichtige Infos in hellen aktiven Farben | Randinformationen in Grün/Blau\n\nStroop-Effekt: Wörter werden schneller wahrgenommen als Farben\n\nFARBEN & WIRKUNG:\nRot – stärkste Farbe, Energie, Wärme, Aufmerksamkeit. Nur als Akzent!\nGelb – stärkste Leuchtkraft, zwiespältig (Sonne vs. Neid)\nBlau – beliebteste Farbe, kalt, seriös, vertrauenswürdig\nGrün – Natur, Gesundheit, Farbton entscheidend\nOrange – aktivierend, sozial, positive Signalwirkung\nViolett – geheimnisvoll, auffällig, passenden Ton treffen\nGrau – neutral, technisch, als Hintergrund geeignet\nSchwarz – stark, edel, zeitlos (matt wirkt edler als glänzend)\nWeiß – Leere, Leichtigkeit, Reinheit – Weiß des Papiers ist bereits Farbe!\n\nFarbe ≠ Farbe: kulturelle & individuelle Unterschiede immer beachten!',imgs:[]},
    {id:'d02e',icon:'ti-contrast',title:'Farbkontraste',desc:'Farbkontraste entstehen wenn verschiedene Farben aufeinandertreffen.\n\nKomplementärkontrast – stärkster Kontrast\n– gegenüberliegende Farben im Farbkreis\n– Leuchtkraft wird gegenseitig verstärkt\n– sensibel einsetzen, kann schnell überreizen\n\nHell-Dunkel-Kontrast – einer der stärksten!\n– Prioritäten, Abstufungen, Bewegung darstellen\n– funktioniert bei allen Farben, nicht nur SW\n\nKalt-Warm-Kontrast\n– Blau-Grün = kälteste | Rot-Orange = wärmste\n– für perspektivische Räumlichkeit einsetzen\n\nBuntkontrast (Farbe-an-sich)\n– Primärfarben, mit SW abtrennen verstärkt Wirkung\n– für Warnhinweise, Verkehrszeichen geeignet\n\nUnbunt-Bunt-Kontrast\n– Satte Farbe auf grauem/weißem Hintergrund\n– ideal für Screen- und Interfacedesign\n\nSimultankontrast\n– Nebeneinander liegende Farben beeinflussen sich gegenseitig\n– Worst Case: Rot & Grün nebeneinander!\n\nFlimmerkontrast\n– Zwei ungetrübte Farben gleicher Helligkeit → anstrengend, vermeiden!\n\nQualitätskontrast – Sättigungsgrad | Quantitätskontrast – Flächengröße',imgs:[]},
    {id:'d02f',icon:'ti-ripple',title:'HSB-Modell & Farbharmonie',desc:'HSB-Modell:\n– Hue (Farbton) = genauer Ton im Farbkreis\n– Saturation (Sättigung) = Intensität/Reinheit (0% = Grauton)\n– Brightness (Helligkeit) = Hell-/Dunkelstufen (15% = blass, 95% = voll)\n\nAngaben in % – nicht mit Transparenz verwechseln!\nKräftige Farben: hohe Sättigung | Grautöne: ungesättigt\n\nFARBHARMONIE:\n– Chromatische Farbreihe: benachbarte Farben aus Farbkreis\n– Monochromatisch: ein Farbton in verschiedenen Helligkeiten\n– Winkelkontrast: Zweier-, Dreier-, Vierer-Harmonien\n\nWichtigste Regel: Weniger ist mehr!\nFarbauswahl nie nach persönlichem Geschmack – nach Botschaft & Zielgruppe.\n\nFarbenfehlsichtigkeit: 8% der Europäer betroffen (Rot-Grün-Schwäche)',imgs:[]},
    {id:'d02g',icon:'ti-printer',title:'Sonderfarben & Farbmanagement',desc:'SONDERFARBEN (über CMYK hinaus):\n– Pantone (PMS): 14 Vollton + 1775 Farbtöne, nummerisch\n  C = coated | U = uncoated | M = matte\n– HKS: 120 Vollton + 3520 Töne, deutschsprachiger Raum, Technik\n– RAL: 1688 Farben, vierstellige Nummern, öffentlicher Bereich\n\nFARBMANAGEMENT:\n– ICC-Profile = Farbcharakteristik jedes Geräts\n– Color Matching Modul (CMM) = rechnet Farbe zwischen Geräten um\n– Kalibrierung nötig für konsistente Wiedergabe\n\nCIE-Lab-System:\n– Geräteunabhängiger Farbraum (seit 1976)\n– L = Helligkeit | a = Rot-Grün | b = Blau-Gelb\n– Größerer Farbraum als RGB oder CMYK\n\nFarben im Internet: #RRGGBB (Hexadezimal)\nz.B. #ff9900 = ff(Rot) + 99(Grün) + 00(Blau)',imgs:[]},
  ],
  c03:[
    {id:'d03a',icon:'ti-photo',title:'Bildkomposition',desc:'Drittelregel, Fluchtpunkt, Rahmung – bewusst fotografieren und ausschneiden.',imgs:[]},
    {id:'d03b',icon:'ti-adjustments',title:'Exportformate',desc:'JPEG – verlustbehaftet, Fotos & Web\nPNG – verlustfrei, mit Transparenz\nTIFF – verlustfrei, Druck (300 dpi)\nWebP – modernes Web, kleiner als JPEG\nSVG – Vektorformat, beliebig skalierbar',imgs:[]},
    {id:'d03c',icon:'ti-robot',title:'KI in der Bildbearbeitung',desc:'Generative Füllung: KI erstellt Bildbereiche nahtlos\nEntfernen-Werkzeug: Objekte rot markieren → KI entfernt\nKI-Indizien: merkwürdige Hände, zu glatte Haut, unnatürliche Belichtung',imgs:[]},
  ],
  c04:[
    {id:'d04a',icon:'ti-letter-t',title:'Schriftklassen',desc:'Serif, Sans-Serif, Monospace, Display – Wirkung und Einsatzbereiche.',imgs:[]},
    {id:'d04b',icon:'ti-line-height',title:'Mikrotypografie',desc:'Kerning = Abstand zwischen zwei Zeichen\nTracking = globaler Zeichenabstand\nLeading = Zeilenabstand (optimal: 120–145 % der Schriftgröße)',imgs:[]},
  ],
  c05:[{id:'d05a',icon:'ti-icons',title:'Icon-Systeme',desc:'Konsistente Sets: gleiche Strichstärke, gleicher Stil, gleiches Raster.',imgs:[]},{id:'d05b',icon:'ti-vector',title:'Piktogrammgestaltung',desc:'Reduktion auf das Wesentliche.',imgs:[]}],
  c06:[{id:'d06a',icon:'ti-layout-columns',title:'Rastersysteme',desc:'Spalten-, Modul- und Grundlinienraster für konsistente Layouts.',imgs:[]},{id:'d06b',icon:'ti-file-text',title:'Editorial Design',desc:'Satzspiegelkonstruktion und Leseführung in Magazinen und Büchern.',imgs:[]}],
  c07:[{id:'d07a',icon:'ti-circle',title:'Logoformen',desc:'Wortmarke, Bildmarke, Kombinations-, Buchstaben- und Emblemmarke.',imgs:[]},{id:'d07b',icon:'ti-rulers',title:'Schutzzone & Skalierung',desc:'Mindestgröße, Schutzzone, SW-Version definieren.\nVektoren (SVG, AI, EPS) für verlustfreie Skalierung.',imgs:[]}],

};

let curArea='kurs', curAdobe='ps', mCtx='kurs', editId=null, editKey=null;
const openCh=new Set();

function ls(){try{return JSON.parse(localStorage.getItem('gd4')||'{}')}catch{return{}}}
function ss(s){localStorage.setItem('gd4',JSON.stringify(s))}
function getCards(k){const s=ls();return s.cards&&s.cards[k]?s.cards[k]:(DC[k]||[])}
function setCards(k,v){const s=ls();if(!s.cards)s.cards={};s.cards[k]=v;ss(s)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function cardHTML(card,key){
  const tc=TAG[key]||'t01', tl=TL(key)||'';
  const imgs=Array.isArray(card.imgs)?card.imgs:[];
  const imgBlocks=imgs.filter(i=>i&&i.url).map(i=>`
    <div class="card-img-block">
      <img src="${esc(i.url)}" alt="${esc(i.caption||'')}" loading="lazy" onerror="this.parentElement.style.display='none'">
      ${i.caption?`<div class="card-img-caption">${esc(i.caption)}</div>`:''}
    </div>`).join('');
  return `<div class="card" id="cd-${card.id}">
    <div class="card-main">
      <span class="card-tag ${tc}">${esc(tl)}</span>
      <div class="card-title"><i class="ti ${card.icon||'ti-file'}" aria-hidden="true" style="font-size:14px;opacity:.55"></i>${esc(card.title)}</div>
      <div class="card-desc">${esc(card.desc)}</div>
    </div>
    ${imgBlocks}
    <div class="card-foot">
      <button class="foot-btn" onclick="openEdit('${key}','${card.id}')"><i class="ti ti-pencil" aria-hidden="true"></i> Bearbeiten</button>
      <button class="foot-btn del" onclick="delCard('${key}','${card.id}')"><i class="ti ti-trash" aria-hidden="true"></i> Löschen</button>
    </div>
  </div>`;
}

function emptyHTML(){return'<div class="empty" style="grid-column:1/-1"><i class="ti ti-cards"></i>Noch keine Karten</div>'}

function chAccordion(c,cards,key){
  const isOpen=openCh.has(key);
  return `<div class="chapter${isOpen?' open':''}" id="ch-${key}">
    <div class="chapter-head" onclick="toggleCh('${key}')">
      <span class="chapter-num">${esc(c.n||'')}</span>
      <span class="chapter-name">${esc(c.t||AP[key]||key)}</span>
      <span class="chapter-count" id="cnt-${key}">${cards.length} Karten</span>
      <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
    </div>
    <div class="chapter-body">
      <div class="cards" id="cards-${key}">${cards.map(cd=>cardHTML(cd,key)).join('')||emptyHTML()}</div>
      <button class="add-btn" onclick="openAdd('${key}')"><i class="ti ti-plus" aria-hidden="true"></i> Karte hinzufügen</button>
    </div>
  </div>`;
}

function toggleCh(key){
  if(openCh.has(key))openCh.delete(key);else openCh.add(key);
  document.getElementById('ch-'+key)?.classList.toggle('open',openCh.has(key));
}

function renderKurs(){document.getElementById('kursView').innerHTML=CH.map(c=>chAccordion(c,getCards(c.id),c.id)).join('')}
function renderAdobe(){
  const key=curAdobe,cards=getCards(key);
  document.getElementById('adobeChapters').innerHTML=chAccordion({n:'',t:AP[key]},cards,key);
  if(!openCh.has(key)){openCh.add(key);document.getElementById('ch-'+key)?.classList.add('open')}
}

function switchArea(a,btn){
  curArea=a;
  document.querySelectorAll('.area-switch button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('kursView').style.display=a==='kurs'?'':'none';
  document.getElementById('adobeView').style.display=a==='adobe'?'':'none';
  clearSearch();
  if(a==='adobe')renderAdobe();
}
function switchAdobe(p,btn){
  curAdobe=p;
  document.querySelectorAll('.adobe-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAdobe();
}

function reRender(key){
  const cards=getCards(key);
  const g=document.getElementById('cards-'+key);
  const cnt=document.getElementById('cnt-'+key);
  if(g)g.innerHTML=cards.map(cd=>cardHTML(cd,key)).join('')||emptyHTML();
  if(cnt)cnt.textContent=cards.length+' Karten';
}
function delCard(key,id){
  if(!confirm('Karte löschen?'))return;
  setCards(key,getCards(key).filter(c=>c.id!==id));
  reRender(key);
}

// ── Modal ──────────────────────────────────────────────────────────────────
function resetModal(){
  document.getElementById('fT').value='';
  document.getElementById('fD').value='';
  document.getElementById('fI').value='ti-file';
  document.getElementById('imgEntries').innerHTML='';
}
function addImgRow(url='',caption=''){
  const row=document.createElement('div');
  row.className='img-row';
  row.innerHTML=`<div style="flex:1;display:flex;flex-direction:column;gap:4px">
    <input class="fi" type="text" placeholder="https://… (Bild-URL)" value="${esc(url)}">
    <input class="fi" type="text" placeholder="Bildunterschrift (optional)" value="${esc(caption)}">
  </div>
  <button type="button" class="img-del" onclick="this.parentElement.remove()"><i class="ti ti-x" aria-hidden="true"></i></button>`;
  document.getElementById('imgEntries').appendChild(row);
}
function getImgRows(){
  return [...document.getElementById('imgEntries').querySelectorAll('.img-row')].map(row=>{
    const ins=row.querySelectorAll('input');
    return {url:(ins[0]?.value||'').trim(),caption:(ins[1]?.value||'').trim()};
  }).filter(i=>i.url);
}

function openAdd(key){
  editId=null; editKey=key; mCtx=key.startsWith('c')?'kurs':'adobe';
  resetModal();
  const fcg=document.getElementById('fCG');
  if(mCtx==='kurs'){
    fcg.style.display='';
    document.getElementById('fC').innerHTML=CH.map(c=>`<option value="${c.id}" ${c.id===key?'selected':''}>${c.n} – ${c.t}</option>`).join('');
    document.getElementById('mTitle').textContent='Neue Karte';
  } else {
    fcg.style.display='none';
    document.getElementById('mTitle').textContent=`Neue Karte – Adobe ${AP[key]}`;
  }
  document.getElementById('backdrop').classList.add('open');
  setTimeout(()=>document.getElementById('fT').focus(),50);
}

function openEdit(key,id){
  const card=getCards(key).find(c=>c.id===id);
  if(!card)return;
  editId=id; editKey=key; mCtx=key.startsWith('c')?'kurs':'adobe';
  resetModal();
  document.getElementById('fT').value=card.title||'';
  document.getElementById('fD').value=card.desc||'';
  document.getElementById('fI').value=card.icon||'ti-file';
  (Array.isArray(card.imgs)?card.imgs:[]).filter(i=>i&&i.url).forEach(i=>addImgRow(i.url,i.caption||''));
  const fcg=document.getElementById('fCG');
  if(mCtx==='kurs'){
    fcg.style.display='';
    document.getElementById('fC').innerHTML=CH.map(c=>`<option value="${c.id}" ${c.id===key?'selected':''}>${c.n} – ${c.t}</option>`).join('');
    document.getElementById('mTitle').textContent='Karte bearbeiten';
  } else {
    fcg.style.display='none';
    document.getElementById('mTitle').textContent=`Karte bearbeiten – Adobe ${AP[key]}`;
  }
  document.getElementById('backdrop').classList.add('open');
  setTimeout(()=>document.getElementById('fT').focus(),50);
}

function closeModal(){document.getElementById('backdrop').classList.remove('open')}
function closeOut(e){if(e.target===document.getElementById('backdrop'))closeModal()}

function saveCard(){
  const title=document.getElementById('fT').value.trim();
  const desc=document.getElementById('fD').value.trim();
  if(!title||!desc){alert('Bitte Titel und Beschreibung ausfüllen.');return}
  const icon=document.getElementById('fI').value.trim()||'ti-file';
  const imgs=getImgRows();
  const key=mCtx==='kurs'?document.getElementById('fC').value:curAdobe;
  if(editId){
    // update existing
    const cards=getCards(editKey).map(c=>c.id===editId?{...c,title,desc,icon,imgs}:c);
    setCards(editKey,cards);
    closeModal();
    reRender(editKey);
  } else {
    const card={id:'u'+Date.now(),icon,title,desc,imgs};
    setCards(key,[...getCards(key),card]);
    closeModal();
    if(!openCh.has(key))openCh.add(key);
    reRender(key);
  }
}

// ── Search ─────────────────────────────────────────────────────────────────
function allCards(){
  const out=[];
  CH.forEach(c=>getCards(c.id).forEach(cd=>out.push({cd,key:c.id})));
  Object.keys(AP).forEach(k=>getCards(k).forEach(cd=>out.push({cd,key:k})));
  return out;
}
function doSearch(q){
  const sv=document.getElementById('searchView'),mv=document.getElementById('mainView');
  if(!q.trim()){sv.style.display='none';mv.style.display='';return}
  sv.style.display='';mv.style.display='none';
  const res=allCards().filter(({cd})=>(cd.title+cd.desc).toLowerCase().includes(q.toLowerCase()));
  document.getElementById('searchLabel').textContent=`${res.length} Ergebnis${res.length!==1?'se':''} für „${q}"`;
  const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  const hi=t=>esc(t).replace(re,'<span class="highlight">$1</span>');
  document.getElementById('searchCards').innerHTML=res.length
    ?res.map(({cd,key})=>{
      const tc=TAG[key]||'t01',tl=TL(key)||'';
      const imgs=Array.isArray(cd.imgs)?cd.imgs:[];
      const imgB=imgs.filter(i=>i&&i.url).map(i=>`<div class="card-img-block"><img src="${esc(i.url)}" alt="${esc(i.caption||'')}" loading="lazy" onerror="this.parentElement.style.display='none'">${i.caption?`<div class="card-img-caption">${esc(i.caption)}</div>`:''}</div>`).join('');
      return `<div class="card"><div class="card-main"><span class="card-tag ${tc}">${esc(tl)}</span><div class="card-title"><i class="ti ${cd.icon||'ti-file'}" aria-hidden="true" style="font-size:14px;opacity:.55"></i>${hi(cd.title)}</div><div class="card-desc">${hi(cd.desc)}</div></div>${imgB}</div>`;
    }).join('')
    :'<div class="empty"><i class="ti ti-search-off"></i>Nichts gefunden.</div>';
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('searchView').style.display='none';
  document.getElementById('mainView').style.display='';
}

renderKurs();
</script>
