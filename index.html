<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafikdesign Referenz</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#fff;--border:#e4e2dc;--border-h:#c8c5bc;
  --text:#1a1917;--muted:#6b6860;--faint:#a09d96;
  --accent:#2563eb;--accent-bg:#eff6ff;
  --r:10px;--rs:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:14px;font-weight:600;letter-spacing:-.01em}
.logo span{color:var(--muted);font-weight:400}

.search-wrap{max-width:680px;margin:1.5rem auto;padding:0 1.5rem;position:relative}
.search-wrap i.si{position:absolute;left:calc(1.5rem + 12px);top:50%;transform:translateY(-50%);font-size:15px;color:var(--faint);pointer-events:none}
.search-input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);font-size:14px;color:var(--text);outline:none;transition:border-color .15s;font-family:inherit}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--faint)}

.page{max-width:680px;margin:0 auto;padding:0 1.5rem 4rem}

.area-switch{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.5rem;background:var(--surface)}
.area-switch button{flex:1;padding:9px 16px;border:none;background:none;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s}
.area-switch button:hover{background:var(--bg)}
.area-switch button.active{background:var(--accent-bg);color:var(--accent)}
.area-switch button+button{border-left:1px solid var(--border)}

/* chapter list rows */
.chapter{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.chapter-head{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .12s}
.chapter-head:hover{background:var(--bg)}
.chapter-num{font-size:11px;font-weight:700;color:var(--faint);min-width:22px}
.chapter-name{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.chapter-count{font-size:11px;color:var(--faint)}
.chevron{font-size:16px;color:var(--faint)}

/* chapter detail page */
.detail-head{display:flex;align-items:center;gap:12px;margin-bottom:1.2rem}
.back-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-size:12px;cursor:pointer;color:var(--muted);font-family:inherit;transition:all .12s;flex-shrink:0}
.back-btn:hover{border-color:var(--border-h);color:var(--text)}
.detail-title{flex:1;font-size:16px;font-weight:600;color:var(--text)}
.detail-count{font-size:11px;color:var(--faint);flex-shrink:0}

/* cards */
.cards{display:flex;flex-direction:column;gap:8px}

.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.card-main{padding:12px 14px}
.card-tag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:99px;margin-bottom:7px}
.card-title{font-size:13px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.card-desc{font-size:12px;color:var(--muted);line-height:1.65;white-space:pre-line}
.card-desc strong{font-weight:700;color:var(--text)}
.card-desc em{font-style:italic}
.card-desc u{text-decoration:underline}
.card-desc s{text-decoration:line-through;opacity:.6}
.card-desc .hl-blue{background:#ede9fe;color:#5b21b6;border-radius:3px;padding:0 3px;font-weight:500}
.card-desc .hl-mint{background:#fce7f3;color:#9d174d;border-radius:3px;padding:0 3px}

/* image blocks within card */
.card-img-block{border-top:1px solid var(--border);padding:10px 14px}
.card-img-block img{width:100%;border-radius:4px;display:block;border:1px solid var(--border)}
.card-img-caption{font-size:11px;color:var(--faint);margin-top:4px}

.card-foot{display:flex;gap:6px;justify-content:flex-end;padding:8px 14px;border-top:1px solid var(--border);background:var(--surface)}
.foot-btn{padding:3px 9px;border:1px solid var(--border);border-radius:4px;background:none;font-size:11px;cursor:pointer;color:var(--faint);font-family:inherit;display:flex;align-items:center;gap:3px;transition:all .12s}
.foot-btn:hover{border-color:var(--border-h);color:var(--text)}
.foot-btn.del:hover{border-color:#fca5a5;color:#ef4444;background:#fef2f2}

.add-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px dashed var(--border);border-radius:var(--rs);background:none;font-size:12px;cursor:pointer;color:var(--faint);font-family:inherit;margin-top:8px;transition:all .15s;width:100%;justify-content:center}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* search */
#searchView{display:none}
.search-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-bottom:10px}
.highlight{background:#fef08a;border-radius:2px;padding:0 1px}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--faint);font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:6px}

/* modal */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;align-items:center;justify-content:center;padding:1rem}
.backdrop.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r);box-shadow:0 20px 60px rgba(0,0,0,.18);padding:1.5rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:600;margin-bottom:1.1rem}
.fg{margin-bottom:.9rem}
.fl{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.fi,.ft,.fs{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;color:var(--text);background:var(--surface);outline:none;font-family:inherit;transition:border-color .15s}
.fi:focus,.ft:focus,.fs:focus{border-color:var(--accent)}
.ft{resize:vertical;min-height:90px}
.fh{font-size:11px;color:var(--faint);margin-top:3px}

/* image entry rows in modal */
.img-entries{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.img-row{display:flex;gap:6px;align-items:flex-start}
.img-row .fi{flex:1}
.img-row .ft{flex:1;min-height:50px}
.img-del{padding:7px 9px;border:1px solid var(--border);border-radius:var(--rs);background:none;cursor:pointer;color:var(--faint);font-size:13px;flex-shrink:0;transition:all .12s}
.img-del:hover{border-color:#fca5a5;color:#ef4444;background:#fef2f2}
.add-img-row{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:1px dashed var(--border);border-radius:var(--rs);font-size:12px;cursor:pointer;color:var(--faint);background:none;font-family:inherit;transition:all .12s}
.add-img-row:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

.modal-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:1.1rem}
.btn-s{padding:7px 14px;border:1px solid var(--border);border-radius:var(--rs);background:none;font-size:13px;cursor:pointer;color:var(--muted);font-family:inherit}
.btn-s:hover{background:var(--bg)}
.btn-p{padding:7px 14px;border:none;border-radius:var(--rs);background:var(--accent);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-p:hover{background:#1d4ed8}

/* tags */
.t01{background:#EEEDFE;color:#3C3489}.t02{background:#E1F5EE;color:#0F6E56}
.t03{background:#FAECE7;color:#993C1D}.t04{background:#E6F1FB;color:#185FA5}
.t05{background:#FAEEDA;color:#854F0B}.t06{background:#E1F5EE;color:#085041}
.t07{background:#FAECE7;color:#712B13}.t08{background:#EEEDFE;color:#26215C}
.t09{background:#FBEAF0;color:#993556}.t10{background:#E6F1FB;color:#0C447C}
.t11{background:#F1EFE8;color:#5F5E5A}.t12{background:#FAEEDA;color:#633806}
.tps{background:#e0f4ff;color:#0369a1}.tai{background:#fff7ed;color:#c2410c}.tid{background:#fdf2f8;color:#9d174d}

/* print button */
.print-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--rs);background:none;font-size:11px;cursor:pointer;color:var(--muted);font-family:inherit;transition:all .12s}
.print-btn:hover{border-color:var(--border-h);color:var(--text)}

/* print view */
@media print{
  @page{margin:14mm}
  body{background:#fff;color:#000;font-size:11px;line-height:1.45}
  header,.search-wrap,.area-switch,.card-foot,.add-btn,.chevron,.back-btn,.backdrop{display:none!important}
  #searchView{display:none!important}
  #mainView{display:block!important}
  .page{max-width:none;padding:0;margin:0}
  .chapter{border:none;border-bottom:1px solid #ccc;border-radius:0;margin-bottom:0;break-inside:avoid-page;page-break-inside:avoid}
  .chapter-head{padding:6px 0;cursor:default}
  .chapter-name{font-size:12px;font-weight:700}
  .detail-head{border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:14px}
  .detail-title{font-size:16px;font-weight:800}
  .cards{gap:6px}
  .card{background:#fff;border:1px solid #ccc;border-radius:0;break-inside:avoid;page-break-inside:avoid}
  .card-main{padding:8px 10px}
  .card-title{font-size:12px}
  .card-desc{font-size:10.5px;color:#111}
  .card-tag{border:1px solid #999;background:#fff!important;color:#000!important}
  .card-desc .hl-blue,.card-desc .hl-mint{background:none!important;color:#000!important;font-weight:700;text-decoration:underline}
  .card-img-block img{max-height:200px;object-fit:contain}
  a[href]::after{content:""}
}
</style>
</head>
<body>

<header>
  <div class="logo">Grafikdesign <span>Referenz</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="print-btn" onclick="printCurrentView()" title="Aktuelle Ansicht drucken / als PDF speichern"><i class="ti ti-printer" aria-hidden="true"></i> Drucken</button>
    <div style="font-size:11px;color:var(--faint)">liselipiseli</div>
  </div>
</header>

<div class="search-wrap">
  <i class="ti ti-search si" aria-hidden="true"></i>
  <input class="search-input" type="text" id="searchInput" placeholder="Begriff suchen – Kerning, Komplementärfarbe, Ebenenmaske …" oninput="doSearch(this.value)">
</div>

<div class="page">
  <div id="searchView">
    <div class="search-label" id="searchLabel"></div>
    <div class="cards" id="searchCards"></div>
  </div>

  <div id="mainView">
    <div id="listWrap">
      <div class="area-switch">
        <button class="active" onclick="switchArea('kurs',this)"><i class="ti ti-book-2" aria-hidden="true"></i> Kurskapitel</button>
        <button onclick="switchArea('adobe',this)"><i class="ti ti-apps" aria-hidden="true"></i> Adobe Tools</button>
      </div>
      <div id="kursView"></div>
      <div id="adobeView" style="display:none"></div>
    </div>
    <div id="detailView" style="display:none"></div>
  </div>
</div>

<!-- Modal -->
<div class="backdrop" id="backdrop" onclick="closeOut(event)">
  <div class="modal">
    <div class="modal-title" id="mTitle">Karte</div>
    <div class="fg"><label class="fl">Titel *</label><input class="fi" type="text" id="fT" placeholder="z. B. Komplementärfarben"></div>
    <div class="fg">
      <label class="fl">Beschreibung *</label>
      <textarea class="ft" id="fD" rows="5" placeholder="Ausführliche Beschreibung …&#10;Zeilenumbrüche werden übernommen."></textarea>
      <div class="fh" style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px">
        <span style="background:#ede9fe;color:#5b21b6;padding:1px 6px;border-radius:3px;font-size:11px">!!wichtig!!</span>
        <span style="background:#fce7f3;color:#9d174d;padding:1px 6px;border-radius:3px;font-size:11px">==markiert==</span>
        <span style="font-size:11px;color:var(--faint)"><strong style="color:var(--text)">**fett**</strong> &nbsp; <em>*kursiv*</em> &nbsp; <u>__unterstr.__</u> &nbsp; <s>~~durch~~</s></span>
      </div>
    </div>
    <div class="fg"><label class="fl">Icon (Tabler-Name)</label><input class="fi" type="text" id="fI" placeholder="ti-palette" value="ti-file"><div class="fh">Optional – Liste: <a href="https://tabler.io/icons" target="_blank" style="color:var(--accent)">tabler.io/icons</a></div></div>
    <div class="fg">
      <label class="fl">Bilder (URL + optionale Bildunterschrift)</label>
      <div class="img-entries" id="imgEntries"></div>
      <button type="button" class="add-img-row" onclick="addImgRow()"><i class="ti ti-plus" aria-hidden="true"></i> Bild hinzufügen</button>
      <div class="fh" style="margin-top:6px">Bilder aus GitHub-Repo oder imgur.com – direkt neben dem Inhalt sichtbar</div>
    </div>
    <div class="fg" id="fCG"><label class="fl">Kapitel</label><select class="fs" id="fC"></select></div>
    <div class="modal-actions">
      <button class="btn-s" onclick="closeModal()">Abbrechen</button>
      <button class="btn-p" onclick="saveCard()">Speichern</button>
    </div>
  </div>
</div>

<script>
const CH=[
  {id:'c01',n:'01',t:'Grundlagen der Gestaltung'},
  {id:'c02',n:'02',t:'Farbe und Farbsysteme'},
  {id:'c03',n:'03',t:'Bild, Bildbearbeitung & KI'},
  {id:'c04',n:'04',t:'Typografie und Schrift'},
  {id:'c05',n:'05',t:'Zeichen, Piktogramme & Icons'},
  {id:'c06',n:'06',t:'Layout und Editorialdesign'},
  {id:'c07',n:'07',t:'Logodesign'},
  {id:'c08',n:'08',t:'Corporate Design'},
  {id:'c09',n:'09',t:'Marketing und Werbung'},
  {id:'c10',n:'10',t:'Screen und Interfacedesign'},
  {id:'c11',n:'11',t:'Designmanagement'},
  {id:'c12',n:'12',t:'Designgeschichte & Abschlussprojekt'},
];
const AP={ps:'Photoshop',ai:'Illustrator',id:'InDesign'};
const TAG={c01:'t01',c02:'t02',c03:'t03',c04:'t04',c05:'t05',c06:'t06',c07:'t07',c08:'t08',c09:'t09',c10:'t10',c11:'t11',c12:'t12',ps:'tps',ai:'tai',id:'tid'};
const TL=k=>k.startsWith('c')?CH.find(c=>c.id===k)?.n:AP[k];

// Default cards – imgs: [{url, caption}]
const DC={
  c01:[
    {id:'d01a',icon:'ti-palette',title:'Grafikdesign & Design-Begriffe',desc:'**Design** = Oberbegriff für alle Arten der Gestaltung\n**Grafikdesign** = nur ein Teil davon, Untergruppe des Kommunikationsdesigns\n\nSchwerpunkte: Produkte, Werbung, Dienstleistungen, Öffentlichkeitsarbeit, Kultur & Wissenschaft\nTätigkeitsfelder: Typografie, Druck, Illustration, Fotografie, Branding, Corporate Design, Werbung\n\nWirtschaftlich Teil der ==Creative Economy/Industries== (Kreativwirtschaft)',imgs:[]},
    {id:'d01b',icon:'ti-message-circle',title:'Kommunikation & Störungen',desc:'**Kommunikation** (lat. communicare = teilen, mitteilen) = Prozess des Sendens & Empfangens von Informationen über ein Medium (physikalisch, biologisch, visuell, auditiv, taktil)\n\n**Eisberg-Modell:**\n– 10% Fakten, Logik, Bewusstsein\n– 90% Gefühle, Psyche, Unterbewusstsein (Körpersprache, Gesten, Dialekte …)\n\n**Feedback** wichtig, um Missverständnisse zu vermeiden – Gehörtes in eigenen Worten wiederholen\n\nIm Grafikdesign: Störungen auf 2 Ebenen vermeiden – klare visuelle Übermittlung & zwischenmenschliche Kommunikation\n!!Alles soll von der Zielgruppe unvoreingenommen verstanden werden!!',imgs:[]},
    {id:'d01c',icon:'ti-eye',title:'Semiotik & Zeichenarten',desc:'**Semiotik** = Lehre der Zeichen – erklärt, wie aus Zeichen/Bildern/Wörtern Bedeutung abgeleitet wird\n\n**3 Zeichenarten:**\n**Icon** – bildet Objekt ab (realistisch), z. B. Piktogramme\n**Index** – weist auf etwas hin, kein direkter Bezug (Tabellen, Kurven, Diagramme)\n**Symbol** – steht für Abstraktes, gesellschaftlich vereinbart (z. B. Kreuz, Krone)\n\n**Semiotisches Dreieck:**\nWAS? = Bedeutung/Botschaft (Bezug zum Objekt)\nWOZU? = Wirkung (Bezug zum Betrachter)\nWIE? = Form/Gestaltung (Formen, Farben, Kontraste)',imgs:[]},
    {id:'d01d',icon:'ti-messages',title:'Visuelle Kommunikation & Zeichensysteme',desc:'**Visuelle Kommunikation** = Sprache des Grafikdesigns\n– einseitig (unilateral): kein Feedback möglich → möglichst einfach, klar, ohne Ballast\n\n**Bildsprache vs. Text:** Bilder werden gleichzeitig wahrgenommen, Text nacheinander → Bilder vermitteln schneller\n\n**Zeichensysteme:** Sprache, Gestik/Mimik, Schrift, Piktogramme, Verkehrszeichen, Musik, Grafikdesign\nKombiniert: Bild-Schrift, Bild-Audio\n\n**Kulturelle Unterschiede beachten!** z. B. Blau = Trauerfarbe in Thailand, Hakenkreuz = Glückssymbol in Indien\n\nCodes (Barcode, QR-Code, Morsecode) = verschlüsselte Informationen, die entschlüsselt werden müssen',imgs:[]},
    {id:'d01e',icon:'ti-focus-2',title:'Visuelle Wahrnehmung & Konstanzphänomene',desc:'Wahrnehmung ist überlebensnotwendig, individuell geprägt & stets **selektiv** (nur Fokussiertes wird bewusst wahrgenommen)\n\n**4 Konstanzphänomene** (Umwelt wird trotz wechselnder Umstände als gleichbleibend wahrgenommen):\n**Helligkeitskonstanz** – abhängig von Umgebung, nicht vom Objekt selbst\n**Farbkonstanz** – Auge passt sich Lichtverhältnissen an (Adaption)\n**Größenkonstanz** – Objekt bleibt trotz Entfernung „gleich groß“\n**Formkonstanz** – Form bleibt trotz Blickwinkel gleich',imgs:[]},
    {id:'d01f',icon:'ti-perspective',title:'4 Prinzipien der Wahrnehmung',desc:'Aus der Renaissance (14.–17. Jhd.), Grundlage der späteren Gestaltgesetze:\n\n**Lineare Perspektive** – parallele Linien treffen sich scheinbar am Horizont\n**Atmosphärische Perspektive** – entfernte Objekte wirken blasser/bläulicher (Luftperspektive)\n**Struktur & Textur** – nahe Objekte wirken größer & gröber strukturiert\n**Überlappung** – verdeckte Objekte wirken weiter entfernt',imgs:[]},
    {id:'d01g',icon:'ti-stack-2',title:'Gestaltgesetze I – Prägnanz, Nähe, Ähnlichkeit',desc:'Aus der Gestaltpsychologie (1920er), über 100 Gesetze – beschreiben, wie wir Formen wahrnehmen\n\n**Gesetz der Prägnanz** !!fundamentalstes Gesetz!! – Wahrnehmung tendiert zur einfachsten, klarsten Form (\"gute Gestalt\")\n\n**Gesetz der Nähe** – nah beieinanderliegende Elemente wirken zusammengehörig → schafft optische Ordnung\n**Lehre der Leere**: Leerraum = Teil der Ordnung, keine Platzverschwendung!\n\n**Gesetz der Ähnlichkeit** – gleiche Form/Farbe/Größe wirkt als Einheit, auch über Distanz hinweg (z. B. einheitliche Icons/Buttons im UI)',imgs:[]},
    {id:'d01h',icon:'ti-square-half',title:'Gestaltgesetze II – Einfachheit, Geschlossenheit, Figur-Grund',desc:'**Gesetz der Einfachheit** – Wahrnehmung reduziert Komplexität; unnötige Infos weglassen\n\n**Gesetz der Geschlossenheit** – Gehirn ergänzt unvollständige Formen zu geschlossenen Einheiten (**subjektive Konturen**, z. B. Kanizsa-Dreieck) – wirkt in Kombination mit Nähe noch stärker\n\n**Gesetz der Figur-Grund-Beziehung** – Figur wirkt immer im Bezug zum Hintergrund\n– kleinere Fläche = Figur, größere = Hintergrund\n– Hintergrund soll Vordergrund unterstützen, nicht dominieren',imgs:[]},
    {id:'d01i',icon:'ti-line',title:'Gestaltgesetze III – Kontinuität, Erfahrung, Symmetrie, Dominanz',desc:'**Gesetz der Kontinuität** (gute Fortsetzung) – gleichförmig fortlaufende Elemente wirken als Einheit\n**Gesetz der Erfahrung** – Gehirn gleicht neue Eindrücke mit Erinnerung ab & vervollständigt sie\n**Gesetz der Symmetrie** – symmetrisch angeordnete Objekte wirken zusammengehörig & geordnet\n**Gesetz der durchgehenden Linien** – durchgehende Linien wirken als Einheit\n**Gesetz der Dominanz** – einfache Strukturen wirken dominanter als komplexe\n\n→ Gestaltgesetze sind Werkzeug, um Design zu analysieren & Intuition zu schärfen',imgs:[]},
    {id:'d01j',icon:'ti-triangle-square-circle',title:'Visuelle Täuschungen',desc:'Nicht alles was wir wahrnehmen entspricht der Realität\n**Multistabile Wahrnehmung** (z. B. Kippfiguren) – mehrere Interpretationen gleichzeitig möglich\n\nBewusst einsetzbar für Doppeldeutigkeit in Logos oder Bewegungseindruck – aber Vorsicht bei ungewollten Effekten!',imgs:[]},
    {id:'d01k',icon:'ti-shapes',title:'Formen & Grundelemente',desc:'**Naturformen** vs. **Kulturformen** (von Menschen geschaffen)\nForm & Raum bedingen sich gegenseitig (Form = positiv, Raum meist negativ)\n\n**3 Grundformen:**\n**Kreis** – ruhig, geschlossen, absolut, kein Anfang/Ende\n**Quadrat** – stabil, seriös (Bau-/Finanzbranche)\n**Dreieck** – dynamisch; Spitze oben = aufstrebend, Spitze unten = bedrohlich\nplus **Ellipse** (dynamischer Kreis) und **Rechteck** (dynamisches Quadrat)\n\n**Grundelemente:** Punkt (kleinste Einheit) → Linie (verbindet 2 Punkte, führt den Blick) → Fläche (Form + Ausdehnung)',imgs:[]},
    {id:'d01l',icon:'ti-ruler-2',title:'Proportionen & Leerraum',desc:'**Leerraum** = essenzielles Gestaltungselement, keine Platzverschwendung – setzt Schwerpunkte & Spannung\n\n**Optische Mitte** ≠ geometrische Mitte – muss „erfühlt“ werden\n\n**Goldener Schnitt** \"göttliche Teilung\" – bekanntestes Harmoniegesetz, Fibonacci-Folge (1,2,3,5,8,13…), Basis vieler Bildkompositionen\n\n**Visuelle Gewichtung:**\n– je höher platziert, desto gewichtiger\n– je dunkler, desto gewichtiger\n– je größer, desto gewichtiger (aber nicht zwingend interessanter!)',imgs:[]},
    {id:'d01m',icon:'ti-arrows-shuffle',title:'Symmetrie & Asymmetrie',desc:'**Symmetrie** = Balance, Sicherheit, Stabilität, Professionalität\n3 Arten: **Spiegelsymmetrie** (häufigste), **Rotationssymmetrie** (Bewegung/Ruhe), **Translationssymmetrie** (wiederholende Verschiebung, Muster)\n\n**Asymmetrie** = Dynamik, Spannung, Kontrast, wiegt visuell schwerer\n\n→ Symmetrie: ruhige Logos/Layouts/Muster | Asymmetrie: Aufmerksamkeit, Einzigartigkeit, Fokus',imgs:[]},
    {id:'d01n',icon:'ti-briefcase',title:'Gestaltungsprozess & Berufsbild',desc:'**3 Gestaltungsphasen:**\n1. Ideenskizze (\"Scribble\") – visuelles Brainstorming, immer erst mit Stift/Papier!\n2. Layout/Visualisierung – Format festlegen, Blindtext, Kundenfeedback\n3. Reinzeichnung – finale Bilder/Texte, Korrektur, Kundenfreigabe, druckfähige PDF\n\n**Berufsbild:** \"Grafikdesigner\" ist kein geschützter Titel – Qualität setzt sich durch\nAufgaben: Layouts, Styleguides, Illustrationen, Marketingkonzepte, Bildrechte kennen\n!!Grafikdesigner sorgt für Einfachheit – reduziert Überflüssiges!!\n\nSpezialisierung wichtig für klares Profil (Print- vs. Nonprintmedien)\n\n(Grafik-)Designverbände: AGD, BDG, ADC, DDC, SGD, Design Austria',imgs:[]},
    {id:'d01o',icon:'ti-armchair',title:'Arbeitsplatz-Tipps',desc:'Gute Arbeitsumgebung fördert Kreativität & Workflow:\n**Ordnung** – aufgeräumter Schreibtisch = Klarheit\n**Dekoration** – Pflanzen, Bilder, aber: weniger ist mehr\n**Frische Luft & Tageslicht** – regelmäßig lüften, Schreibtisch nah am Fenster\n**Augen-Relaxing** – regelmäßig vom Bildschirm wegschauen\n**Musik** – kann Kreativität & Rhythmus des Designs beeinflussen',imgs:[]},
  ],
  c02:[
    {id:'d02a',icon:'ti-eye',title:'Farbe & Wahrnehmung',desc:'Farbe physikalisch: nur elektromagnetische Strahlung – sichtbares Licht liegt zwischen 380–780 nm\n\nFarbwahrnehmung:\n– Objekte absorbieren/reflektieren Licht → reflektierter Anteil = wahrgenommene Farbe\n– Bsp. Kirsche reflektiert Rot, absorbiert alle anderen Wellenlängen\n\nFarbkonstanz: Zapfen passen sich Helligkeitsbedingungen an\n\nAuge: Stäbchen = Helligkeitswahrnehmung (SW) | Zäpfchen = Farbsehen\n– S-Zapfen = Blau | M-Zapfen = Grün | L-Zapfen = Rot\n\nSehen & wahrnehmen lernen ist ein lebenslanger, aktiver Prozess.\nBewusst sehen = tägliches Training des Grafikdesigners.',imgs:[]},
    {id:'d02b',icon:'ti-palette',title:'RGB vs. CMYK',desc:'RGB – Additive Farbmischung:\n– Lichtfarben: Rot, Grün, Blau\n– Werte 0–255 (8 Bit = 16,7 Mio. Farben)\n– Bildschirm, Beamer, Kamera, Scanner\n– Alle voll → Weiß | keine → Schwarz\n\nCMYK – Subtraktive Farbmischung:\n– Körperfarben: Cyan, Magenta, Yellow + Schwarz (K)\n– Werte 0–100 %\n– Druckerzeugnisse aller Art\n– Schwarz extra, da Mischung nur Braunton ergibt\n\nRGB-Farbraum ist größer als CMYK → nicht alle RGB-Farben druckbar\nEmpfehlung: Farbdefinition von CMYK ausgehend erstellen\n\nBildschirm = RGB | Druck = CMYK – von Anfang an festlegen!',imgs:[]},
    {id:'d02c',icon:'ti-history',title:'Geschichte der Farbenlehre',desc:'Newton (1642–1727):\n– Prisma zerlegt Sonnenlicht → 7 Hauptfarben\n– Erster Farbkreis: verband Violett mit Rot\n– Schwarz & Weiß nicht enthalten\n\nGoethe (1749–1832):\n– Schwerpunkt psychologische Wirkung\n– Farbe = Grenzphänomen zwischen Hell und Dunkel\n– Grundfarben: Rot (Purpur), Gelb, Blau\n– Komplementärfarben stehen sich gegenüber\n\nItten (1888–1967):\n– 12 Farben auf Basis Rot, Blau, Gelb\n– Primär → Sekundär → Tertiärfarben\n– Komplementärfarben = diametral gegenüber, besonders harmonisch\n\nKüppers (geb. 1928):\n– 8 Grundfarben basierend auf den 3 Zapfentypen OGV\n– Farbsechseck mit 6 Komplementärpaaren\n– Rhomboeder-Farbraum: 3D-Vektormodell\n→ Für Gestaltung Küppers dem symmetrischen Farbkreis vorziehen!',imgs:[]},
    {id:'d02d',icon:'ti-drop',title:'Farbwirkung & Psychologie',desc:'Jede Farbe hat positive & negative Assoziationen.\nKontext entscheidet über Bedeutung.\n\nReaktionszeit: Gelb → Weiß → Rot → Grün → Blau (Gelb am schnellsten!)\nWichtige Infos in hellen aktiven Farben | Randinformationen in Grün/Blau\n\nStroop-Effekt: Wörter werden schneller wahrgenommen als Farben\n\nFARBEN & WIRKUNG:\nRot – stärkste Farbe, Energie, Wärme, Aufmerksamkeit. Nur als Akzent!\nGelb – stärkste Leuchtkraft, zwiespältig (Sonne vs. Neid)\nBlau – beliebteste Farbe, kalt, seriös, vertrauenswürdig\nGrün – Natur, Gesundheit, Farbton entscheidend\nOrange – aktivierend, sozial, positive Signalwirkung\nViolett – geheimnisvoll, auffällig, passenden Ton treffen\nGrau – neutral, technisch, als Hintergrund geeignet\nSchwarz – stark, edel, zeitlos (matt wirkt edler als glänzend)\nWeiß – Leere, Leichtigkeit, Reinheit – Weiß des Papiers ist bereits Farbe!\n\nFarbe ≠ Farbe: kulturelle & individuelle Unterschiede immer beachten!',imgs:[]},
    {id:'d02e',icon:'ti-contrast',title:'Farbkontraste',desc:'Farbkontraste entstehen wenn verschiedene Farben aufeinandertreffen.\n\nKomplementärkontrast – stärkster Kontrast\n– gegenüberliegende Farben im Farbkreis\n– Leuchtkraft wird gegenseitig verstärkt\n– sensibel einsetzen, kann schnell überreizen\n\nHell-Dunkel-Kontrast – einer der stärksten!\n– Prioritäten, Abstufungen, Bewegung darstellen\n– funktioniert bei allen Farben, nicht nur SW\n\nKalt-Warm-Kontrast\n– Blau-Grün = kälteste | Rot-Orange = wärmste\n– für perspektivische Räumlichkeit einsetzen\n\nBuntkontrast (Farbe-an-sich)\n– Primärfarben, mit SW abtrennen verstärkt Wirkung\n– für Warnhinweise, Verkehrszeichen geeignet\n\nUnbunt-Bunt-Kontrast\n– Satte Farbe auf grauem/weißem Hintergrund\n– ideal für Screen- und Interfacedesign\n\nSimultankontrast\n– Nebeneinander liegende Farben beeinflussen sich gegenseitig\n– Worst Case: Rot & Grün nebeneinander!\n\nFlimmerkontrast\n– Zwei ungetrübte Farben gleicher Helligkeit → anstrengend, vermeiden!\n\nQualitätskontrast – Sättigungsgrad | Quantitätskontrast – Flächengröße',imgs:[]},
    {id:'d02f',icon:'ti-ripple',title:'HSB-Modell & Farbharmonie',desc:'HSB-Modell:\n– Hue (Farbton) = genauer Ton im Farbkreis\n– Saturation (Sättigung) = Intensität/Reinheit (0% = Grauton)\n– Brightness (Helligkeit) = Hell-/Dunkelstufen (15% = blass, 95% = voll)\n\nAngaben in % – nicht mit Transparenz verwechseln!\nKräftige Farben: hohe Sättigung | Grautöne: ungesättigt\n\nFARBHARMONIE:\n– Chromatische Farbreihe: benachbarte Farben aus Farbkreis\n– Monochromatisch: ein Farbton in verschiedenen Helligkeiten\n– Winkelkontrast: Zweier-, Dreier-, Vierer-Harmonien\n\nWichtigste Regel: Weniger ist mehr!\nFarbauswahl nie nach persönlichem Geschmack – nach Botschaft & Zielgruppe.\n\nFarbenfehlsichtigkeit: 8% der Europäer betroffen (Rot-Grün-Schwäche)',imgs:[]},
    {id:'d02g',icon:'ti-printer',title:'Sonderfarben & Farbmanagement',desc:'SONDERFARBEN (über CMYK hinaus):\n– Pantone (PMS): 14 Vollton + 1775 Farbtöne, nummerisch\n  C = coated | U = uncoated | M = matte\n– HKS: 120 Vollton + 3520 Töne, deutschsprachiger Raum, Technik\n– RAL: 1688 Farben, vierstellige Nummern, öffentlicher Bereich\n\nFARBMANAGEMENT:\n– ICC-Profile = Farbcharakteristik jedes Geräts\n– Color Matching Modul (CMM) = rechnet Farbe zwischen Geräten um\n– Kalibrierung nötig für konsistente Wiedergabe\n\nCIE-Lab-System:\n– Geräteunabhängiger Farbraum (seit 1976)\n– L = Helligkeit | a = Rot-Grün | b = Blau-Gelb\n– Größerer Farbraum als RGB oder CMYK\n\nFarben im Internet: #RRGGBB (Hexadezimal)\nz.B. #ff9900 = ff(Rot) + 99(Grün) + 00(Blau)',imgs:[]},
    {id:'d02h',icon:'ti-brush',title:'Farbe in der Praxis',desc:'**Lesbarkeit:** stärkster Kontrast = Schwarz auf Gelb, danach Hell-Dunkel-Kontraste – nie Farben ähnlicher Helligkeit kombinieren\n\n**Betrachtungsbedingungen:** Wirkung einer Farbe ändert sich je nach Lichtquelle (Tageslicht/Kunstlicht), Umgebung & Bildschirm-Kalibrierung\n\n**Farbe & Räumlichkeit:** warme Farben (Rot/Orange) wirken nah & drängend, kalte Farben (Blau/Grün) wirken fern & zurückweichend → für Tiefenwirkung im Layout nutzbar\n\n**Farbe & Navigation/Leitsysteme:** Farbcodierung schafft schnelle Orientierung (z. B. Stockwerke, Fluchtwege)\n\n**Farbe & Konventionen:** Rot = Verbot/Gefahr/Stopp, Grün = Erlaubnis/Rettung, Blau = Autobahn/Hinweis, Gelb = Achtung – etablierte Farbcodes nicht ohne Grund brechen\n\n**Print vs. Screen:** Druck = CMYK (subtraktiv, körperfarben), Screen = RGB (additiv, Lichtfarben) – Farben wirken auf Bildschirm oft leuchtender als gedruckt\n\n**Farbverläufe (Gradients):** Linear | Radial | Winkelverlauf (konisch) | Reflektiert | Raute | mit mehreren Farben kombinierbar – sparsam & zielgerichtet einsetzen',imgs:[]},
  ],
  c03:[
    {id:'d03a',icon:'ti-photo',title:'Bildaufbau & Bildkomposition',desc:'**Bildaufbau:** Hauptmotiv, Licht, Flächenaufteilung, Rhythmus, Tiefe bewusst gestalten\n**Drittel-Regel:** Motiv auf Rasterlinien/-schnittpunkten platzieren statt mittig\n**Goldener Schnitt:** harmonisches Teilungsverhältnis (≈ 1:1,618)\n\n**Bildausschnitt & Bilddrehung:** Fragen vor dem Ausschnitt – Was ist das Hauptmotiv? Was kann weg? Welches Format passt (Quer/Hoch)?\nGesichter in Werbung vermeiden Austauschbarkeit\nBildgröße erzeugt Wirkung – Henne-Ei-Prinzip: visueller Größenvergleich schafft Bedeutung\n\n!!"Fotografiere niemals etwas, das dich nicht interessiert" – Lisette Model!!\n\n**Perspektivarten (3.1 – lat. "hindurchsehen"):**\n– Zentralperspektive: ein Fluchtpunkt\n– Vogelperspektive: von oben, wirkt klein/unterlegen\n– Froschperspektive: von unten, wirkt groß/mächtig\n– Bedeutungsperspektive: Größe zeigt Wichtigkeit (nicht Realismus)\n– Atmosphärische/Luftperspektive: Ferne wirkt durch Dunst blasser & unschärfer',imgs:[]},
    {id:'d03b',icon:'ti-adjustments',title:'Exportformate & Dateiformate',desc:'**JPEG** – verlustbehaftet, kein Alpha-Kanal, vielseitig (Web + Druck)\n**PNG** – verlustfrei, mit Transparenz, modernes Webformat\n**TIFF** – verlustfrei, große Dateien, Druck-Empfehlung (300 dpi Mittelwert)\n**GIF** – nur 256 Farben, Transparenz & kleine Animationen\n**RAW** – unbearbeitetes Rohdatenformat der Kamera, maximale Bearbeitungsfreiheit, große Dateigröße\n**PSD** – Photoshop-Ebenendatei, alle Bearbeitungsschritte erhalten\n**WebP** – modernes Web-Format, kleiner als JPEG\n**SVG** – Vektorformat, beliebig skalierbar\n\n!!Scannen: TIFF empfohlen, 300 dpi Mittelwert für Druckqualität!!',imgs:[]},
    {id:'d03aa',icon:'ti-crop-1-5',title:'Bildmanipulation & Fotomontage',desc:'Geschichte der Fotomontage: Herbert Matter als Pionier, Collage-Technik als Ursprung\n\n**Bildbearbeitungstechniken:**\n– Freistellen, Vignettierung, Invertieren/Negativbild\n– Zuschneiden, perspektivische Verzerrungen\n– Arbeiten mit Ebenen: "wie übereinanderliegende Folien"\n– Abwedeln & Nachbelichten (partiell auf-/abdunkeln)\n\n**Software:** Photoshop = professionellste Lösung | GIMP = kostenfreie Alternative | Affinity Photo = professionelle Alternative',imgs:[]},
    {id:'d03ab',icon:'ti-message-photo',title:'Bilder & Wahrnehmung, Macht, Propaganda',desc:'Bilder gelten als "Beweis" – doch visuelle Wahrheit ist dehnbar & manipulierbar\n\n**Historische Beispiele:**\n– Reichstag-Flaggenhissung 1945: nachgestelltes Foto\n– Kriegsberichterstattung Irak 1991: gelenkte Bildsprache\n– Diktatoren-Inszenierung: Mussolini/Hitler übten ihre Posen; Kim Jong-un nutzt gezielte Bildgewalt\n– Berliner Mauer: DDR-Propaganda nannte sie "antifaschistischer Schutzwall"\n\n**Heute:** KI-Bilder ("This Person Does Not Exist") = physisch komplett entkoppelte Bildgewalt\n\n!!Bedeutung für den Gestalter: Text/Kontext bestimmt die Wirkung eines Bildes – kritischer Umgang mit Zweck & möglichem Missbrauch ist Pflicht!!',imgs:[]},
    {id:'d03ac',icon:'ti-database',title:'Bilder besorgen & Bildermanagement',desc:'**Kostenpflichtige Bilddatenbanken:** Adobe Stock, Getty Images\n**Kostenfreie Quellen:** Flickr, deviantart, Wikimedia, Unsplash, Pexels, Pixabay, Burst (Shopify)\n!!Immer Nutzungsbedingungen/Lizenz prüfen!!\n\n**Markerskizzen:** klassische Visualisierungsmethode (Firma Copic)\n\n**Bildermanagement:** eigener Fotopool, externe Festplatten – ==am besten mit 2 Backups==\nOrdnerstruktur-Beispiel: Architektur / Experimentell / Farben / Fashion / Food / Nature / People / Studio / Typografie / Tiere\nTools: Adobe Lightroom, ACDSee, Ashampoo Photo Commander, Zoner\n⚠ Cloud-Speicher: Risiko bedenken (Kontrolle/Datenschutz)',imgs:[]},
    {id:'d03ad',icon:'ti-scan',title:'Pixel, dpi/ppi & Scannen',desc:'**px** = Kunstwort aus "picture" + "element"\n**ppi** (pixel per inch) = Bildschirmauflösung | **dpi** (dots per inch) = Druckauflösung\nMindestens **300 dpi** für Druckqualität\n\n**Farbtiefe:** 1-Bit = 2 Farbwerte (S/W) | 8-Bit = 256 Graustufen | 24-Bit RGB = 16,7 Mio. Farben\n\n**Scanfehler-Ursachen:** dreckige Oberfläche, durchscheinende Elemente, Unebenheiten, Rasterstrukturen\n**Scannography:** Scanner kreativ als Aufnahmegerät nutzen',imgs:[]},
    {id:'d03c',icon:'ti-robot',title:'KI in der Bildbearbeitung',desc:'Generative Füllung: KI erstellt Bildbereiche nahtlos\nEntfernen-Werkzeug: Objekte rot markieren → KI entfernt\nKI-Indizien: merkwürdige Hände, zu glatte Haut, unnatürliche Belichtung',imgs:[]},
    {id:'d03d',icon:'ti-device-tablet',title:'Mockup & Präsentation',desc:'**Mockup** = digitaler Entwurf bzw. fotorealistische Darstellung eines Designs (z. B. Website auf Tablet-Foto)\n\nFür Online-Präsentation: ansprechend gestaltete PDF-Datei erstellen',imgs:[]},
    {id:'d03e',icon:'ti-sparkles',title:'KI-Bilder: Chancen & Risiken',desc:'KI-generierte Bilder oft kaum als solche erkennbar → kritischer Umgang mit Inhalt & Einsatz nötig\n\n**Vorteile:** Zeitersparnis, Inspirationsquelle, komplexe Werke möglich\n**Risiken:** kann eigenes gestalterisches Urteilsvermögen einschränken; Urheber- & Persönlichkeitsrechte rechtlich noch ungeklärt\n\nKI urteilt nur nach Mustern/Vergleichen – nicht nach \"richtig\" oder \"falsch\"; fachliche Bildbeurteilung bleibt Aufgabe des Menschen',imgs:[]},
    {id:'d03f',icon:'ti-zoom-question',title:'KI-Indizien erkennen',desc:'• Merkwürdige Hände (zu viele/wenige Finger)\n• Zu glatte, perfekte Haut\n• Unförmige Architektur (z. B. Fenster)\n• Unpassende Beschriftungen\n• Doppelte/fehlende Elemente (Klone)\n• Unnatürliche Belichtung, Spiegelungen, Schatten\n• Sehr weich gezeichnete Hintergründe',imgs:[]},
    {id:'d03g',icon:'ti-message-2',title:'Prompting Grundlagen',desc:'**Prompt** = Anleitung für KI-Modelle zur Ergebnisgenerierung\nKein universeller Prompt – jedes Modell reagiert anders, kein Ergebnis wiederholt sich exakt\n\n**Arten von Prompts:**\n– Text-Prompts (Texteingaben/Codes)\n– Bildprompts (Bild als Grundlage)\n– Kombinierte Prompts (Text + Bild)\n– Negativprompts (Ausschlüsse)\n– Parameterprompts (spezifische KI-Funktionen)\n\n!!Englische Eingaben liefern meist bessere Ergebnisse, v. a. bei Bildgenerierung!!\nChatGPT verzeiht Rechtschreibfehler – bildbasierte Modelle (Midjourney) weniger',imgs:[]},
    {id:'d03h',icon:'ti-checklist',title:'Bildprompt: Vorbereitung',desc:'Vor dem Prompten klären:\n• Welche Infos stehen zur Verfügung? Was ist das Ziel?\n• Anforderungen genau beschreiben\n• Wie viel Freiheit erhält die KI?\n• Vorgaben zu Genre/Stil/Farbe/Material?\n• Referenzbeispiele? Was soll vermieden werden?\n• Anforderungen an Layout/Größe/Textstruktur?\n\n!!Kürze ist entscheidend – präzise, fokussierte Prompts!!\nTrotzdem: spielerisch experimentieren, Ergebnisse sind nie exakt vorhersehbar',imgs:[]},
    {id:'d03i',icon:'ti-puzzle',title:'Bausteine eines Bildprompts',desc:'**Medium** – Fotografie, Illustration, 3D, etc.\n**Hauptelement** – zentrales Motiv & Platzierung\n**Aufbau** – Vorder-/Mittel-/Hintergrund, Nah- oder Panoramaaufnahme, Maße\n**Detailreichtum** – Merkmale, Techniken\n**Farbpalette** – passend zur Stimmung\n**Beleuchtung** – für Atmosphäre\n**Atmosphäre** – gewünschte Stimmung (beruhigend, bedrohlich …)\n**Stilrichtung** – Kunstepochen, Filmästhetik\n**Format** – abhängig vom Verwendungszweck\n\nReihenfolge der Angaben ist flexibel',imgs:[]},
    {id:'d03j',icon:'ti-aspect-ratio',title:'Parameter & Seitenverhältnisse',desc:'Wichtige Parameter: Seitenverhältnis, Bildauflösung, Upscale, Anzahl generierter Bilder (Batch Size), Seeds, Qualität, Version, Stil/Inhaltstyp, Gewichtung\n\n**Gängige Seitenverhältnisse (B:H):**\n1:1 Quadrat (Social/Icons) | 4:3/3:4 Fernseher/Tablet | 3:2/2:3 Fotokamera-Standard\n16:9 Widescreen/YouTube | 16:10 Monitore/Tablets | 5:4 Instagram Hochformat\n5:7/7:5 DIN-A-Format | 9:16 Smartphone-Video/Story | 21:9/9:21 Ultrawide/Gaming',imgs:[]},
    {id:'d03k',icon:'ti-ban',title:'Negativprompts',desc:'Schließen bewusst unerwünschte Details in KI-Bildern aus\nz. B. menschenbezogen: \"ugly, morbid, mutation\" ausschließen\n\n!!Schrittweise experimentieren & regelmäßig aktualisieren, um gewünschtes Ergebnis zu erzielen!!',imgs:[]},
    {id:'d03l',icon:'ti-gavel',title:'EU AI Act & Risikoklassen',desc:'Wer KI beruflich nutzt, unterliegt der Regulierung – egal ob Konzern oder Einzelstudio\nArt. 4: Nutzer müssen ausreichend Wissen haben, um Chancen & Risiken einzuschätzen (auch Designer/Projektleiter!)\n\n**4 Risikoklassen:**\n1. **Minimal** – z. B. Spam-Filter, Rechtschreibkorrektur → DSGVO reicht\n2. **Begrenzt** – z. B. Chatbots, Empfehlungssysteme → Transparenzpflicht (Nutzer muss wissen: KI!)\n3. **Hoch** – z. B. Kreditvergabe, Bewerberauswahl → strenge Prüf-/Dokumentationspflichten\n4. **Unannehmbar** – z. B. Social Scoring, Massenüberwachung → komplett verboten\n\n!!Richtige Einstufung entscheidet über Dokumentations- & Überwachungsaufwand!!',imgs:[]},
    {id:'d03m',icon:'ti-aperture',title:'Fotografie & Wahrnehmung',desc:'Abbildungsstile: Infografik, Illustration, Fotografie – unterschiedliche Grade an Abstraktion vs. Realismus\n\n!!"Das Auge macht das Bild, nicht die Kamera" – Gisèle Freund!!\n→ Bedeutung für den Gestalter: Technik ist Werkzeug, die gestalterische Entscheidung liegt beim Menschen\n\n**S/W- vs. Farbfotografie:** S/W vermittelt oft Vergangenheit – geeignet für Portraits, künstlerische/dramaturgische Zwecke, Dokumentationen\nFarbe vermittelt oft Gegenwart – geeignet für Dynamik, Freude, Realität (z. B. Kinderbroschüre = zwingend bunt)\n\n**Fotografie-Bereiche:** Industrie-, Werbe-/Mode-, künstlerische, journalistische/Dokumentar-, medizinische, Amateurfotografie\nFotografie ist ~200 Jahre jung, gilt als "Abbild der Realität" → macht sie mächtig & gefährlich (siehe Bilder & Macht)',imgs:[]},
    {id:'d03n',icon:'ti-heart',title:'Bilder, Emotion & Werbung',desc:'Bilder wollen durch Komposition, Motiv & Bildwelt gezielt Emotionen auslösen\n**Gesichter** in Werbung sehr häufig – Austauschbarkeit wird durch Farbe/Typografie/Message zusätzlich vermieden\n\n**Ungeschönte Bilder:** realistische, oft harte Motive wecken Empathie (NGOs, Umweltverbände)\n**United Colors of Benetton:** provokante, drastische Kampagnenmotive (ölverschmierte Ente, küssende Geistliche) → weltweite Empörung, gerichtlich als unlautere Werbung verboten\n\n**"Sex sells"** = Gender-Marketing-Redewendung – Wirkung unterscheidet sich stark nach Zielgruppe/Geschlecht\n**Authentizität:** handschriftliche Elemente & zusätzliche Illustrationen aktuell im Trend\n\n!!Bei der Motivwahl gibt es kein falsch/richtig – nur "passt" oder "passt nicht" zur Zielgruppe!!',imgs:[]},
    {id:'d03o',icon:'ti-camera',title:'Fotografieren – Vorbereitung & Bildaufbau',desc:'**Bildaufbau-Elemente:** Hauptmotiv (Fokus aufs Wesentliche), Licht (wichtigstes Element!), Bildaufteilung, Rhythmus (Perspektivwechsel, Detailaufnahmen), Schärfe/Unschärfe (Tiefenschärfe lenkt Fokus)\n\n**Checkliste Fotoshooting-Vorbereitung:**\n– Liste der zu fotografierenden Objekte\n– gewünschten Stil erfragen\n– Honorar & Copyrights klären\n– Terminplan mit Zeitpuffer\n– Kamera-Akku prüfen\n\n**Standortwechsel-Tipp:** Motiv sofort fotografieren bevor sich das Licht ändert; Perspektiven bewusst wechseln\n\n**Kreative Fotografie:** Michael Wesely (Berliner Fotograf) – extreme Langzeitbelichtungen teils über Jahre',imgs:[]},
    {id:'d03p',icon:'ti-wand',title:'Bildbearbeitung – Praxis-Tipps',desc:'**Software:** Photoshop (professionellste Lösung) | Affinity Photo (professionelle Alternative) | GIMP (kostenfrei)\n\n**Freistellen:** intelligente Retusche-Tools vereinfachen die Arbeit; leichter Schattenwurf verhindert "im Raum schwebende" Freisteller\n!!Freisteller immer ohne festen Hintergrund sichern (TIFF/PSD), mind. 300 dpi!!\nGrafiktablett = präziser & effizienter als Maus\n\n**Ebenen-Workflow:** Ebenen exakt benennen spart später viel Zeit; für jeden Bearbeitungsschritt neue Ebene anlegen statt alles auf einer Ebene zu erledigen\n\n**Vektor vs. Pixel (Zusammenfassung):** Vektorgrafik = verlustfrei skalierbar, kein Fotorealismus, wenig Speicher | Pixelgrafik = fotorealistisch, verliert bei Vergrößerung Qualität',imgs:[]},
    {id:'d03q',icon:'ti-file-type-pdf',title:'Vektor-Dateiformate im Vergleich',desc:'**PDF:** plattformunabhängig, druckfähig, kann interaktive Elemente (Links) enthalten – Nachteil: schwer nachträglich editierbar\n**EPS:** plattformübergreifend, für Pixel- & Vektorgrafik nutzbar, bearbeitbar – Nachteil: speicherintensiv\n**SVG:** verlustfrei skalierbar, offenes Web-Format, gut komprimierbar – Nachteil: komplexere Bearbeitung, manche ältere Programme ohne volle Unterstützung\n\nEinsatzbereiche: Web, Druck, Software – je nach Format unterschiedlich geeignet',imgs:[]},
  ],
  c04:[
    {id:'d04a',icon:'ti-history',title:'Geschichte der Schrift',desc:'Schrift = Emotions- & Informationsträger, seit Jahrtausenden Entwicklungsprozess\n\n**Meilensteine:**\n– ~5000 Jahre alte Tontafeln (Mesopotamien): Keilschrift, aus Piktogrammen entwickelt\n– Hieroglyphen (~3200 v.u.Z.): ägyptische Begriffs- & Lautschrift\n– Phönizisches Alphabet (1100 v.u.Z.): 22 Buchstaben\n– Griechen (900 v.u.Z.): erweitern auf 25 Buchstaben, führen Vokale ein\n– Etrusker: 26 Buchstaben, 21 davon gelangen ins Römische Reich\n– **Capitalis Monumentalis** (Rom, um 100): perfektionierte Großbuchstabenform, bis heute Vorbild\n\n**Klein-/Großbuchstaben-Entwicklung:**\nCapitalis Quadrata → Capitalis Rustika → Unziale (4. Jh., rund) → Halbunziale (5. Jh., erste Kleinbuchstaben) → Karolingische Minuskel (Karl der Große) → zusammen Basis der Antiqua-Schriften\n\nMajuskeln = Großbuchstaben/Versalien | Minuskeln = Kleinbuchstaben/Gemeine\n\n**Gebrochene Schriften** (Gotisch, Schwabacher, Fraktur): dominierten Europa lange; Fraktur wurde im NS-Regime als "deutsche Schrift" missbraucht → heute eher dekorativ als informativ\n\n**Vom Bleisatz zum Digitalsatz:** Gutenberg (bewegliche Lettern, 15. Jh.) → Setzmaschinen → Fotosatz → Digitalsatz\n\n!!Gute Schrift ist harmonisch, drängt sich nicht auf & hat Respekt vor dem Leser!!',imgs:[]},
    {id:'d04b',icon:'ti-flag',title:'Schrift & Macht, Schrift & Wirkung',desc:'Schrift bedeutet immer auch Macht & Identität – Mächtige nutzen sie für Gesetze & Propaganda\nBeherrschung der Schrift = Voraussetzung für gesellschaftliche Teilhabe (analog & digital)\n\n**Schrift & Wirkung:** beeinflusst nicht nur durch Inhalt, sondern unbewusst durch Form & Anmutung\nSchriftwahl ist subjektiv & zielgruppenabhängig – der Kontext entscheidet über die richtige Schrift\n\n**Typografie & Werbung:** inflationärer Einsatz erzeugt "typografisches Hintergrundrauschen"; smart eingesetzt kann Typografie gezielt Gefühle/Assoziationen wecken (Premium vs. Billig)\n\n**Geschlechtsspezifische Typografie:** Gender-Marketing nutzt Klischees bewusst oder bricht sie bewusst auf – Tendenz heute Richtung Genderneutralität',imgs:[]},
    {id:'d04c',icon:'ti-eye-check',title:'Lesen & Lesbarkeit',desc:'Auge liest keine Einzelbuchstaben, sondern **Wortbilder** (~9 Zeichen auf einmal) → Wörter-/Zeilenabstand entscheidend für Lesefluss\nSukkade = Sprung zum nächsten Fixationspunkt | Regression = wiederholtes Lesen | Rückschwung = Satzende in nächster Zeile\n\n**Leserarten je Medium:** Buch, Plakat, Zeitschrift, Website – jeweils andere Anforderungen an Schriftwahl/-größe/Zeilenabstand\n\n**5 Lesearten:**\n– Lineares Lesen: serifenbetont, 50–60 Zeichen/Zeile optimal, <25 Zeichen = Rücksprunggefahr\n– Informierendes Lesen: Headlines zuerst, Blocksatz für Ruhe, klare Hierarchie\n– Konsultierendes Lesen: bold/kursiv als Auszeichnung (z. B. Lexikon)\n– Inszenierendes Lesen: Effekte, freie Textsetzung\n– Selektierendes Lesen: gezielte Suche (z. B. Kochbuch)\n\n**Lesen am Bildschirm:** Beleuchtung + geringe Auflösung ermüden das Auge schneller, dafür Vorteile durch Flexibilität (Zoom, Kontrast, Kopieren)\n\n**Faustregeln:** eindeutigste Buchstabenformen am besten lesbar | Wortabstand < Zeilenabstand | je länger die Zeile, desto größer der Zeilenabstand',imgs:[]},
    {id:'d04d',icon:'ti-letter-t',title:'Schriftklassifikationen',desc:'DIN-Klassifizierung: 11 Schriftgruppen | vereinfachte Variante: Serif vs. Serifenlos\n\n**Antiqua-Familie (Serif):**\n– Venezianische Renaissance-Antiqua: schräger Querstrich beim "e"\n– Französische Renaissance-Antiqua (Mediäval): waagerechter Querstrich, beste Leseschrift\n– Barock-Antiqua: stärkere Strichkontraste\n– Klassizistische Antiqua (Bodoni/Didot): extremer Dick-Dünn-Kontrast\n– Serifenbetonte Linear-Antiqua/Egyptienne: kaum Strichkontrast, markante Serifen (Rockwell, Clarendon)\n\n**Grotesk (serifenlos):** ab 1920er/30er Leitschrift des 20. Jh., vier Untergruppen, prägt Web/Plakate/Anzeigen bis heute\n\n**Weitere:** Schreibschriften, gebrochene Schriften, fremde Schriften, Bitmap-Schriften (Bauhaus-Wurzeln, Techno-Ästhetik)\n\n!!Grundsätzlich: Kontext entscheidet über Serif vs. Grotesk – nicht persönlicher Geschmack!!',imgs:[]},
    {id:'d04e',icon:'ti-typography',title:'Bekannte Schriften',desc:'**Helvetica** – Max Miedinger, 1950er; kommerziellste Schrift des 20. Jh.; Schriftform selbst nicht schützbar (→ Arial als Kopie)\n**Frutiger** – Adrian Frutiger, für Flughafen-/Metro-Leitsysteme (100% Lesbarkeitstest) – "Flughafenschrift"\n**Futura** – Paul Renner 1928, geometrisch, prägte VW-Werbung\n**Garamond** – Claude Garamond, 16. Jh., zeitloser Klassiker für Fließtext\n**Times** – Stanley Morrison 1931, für "The Times" entworfen\n**Rotis** – Otl Aicher 1989, Ziel maximale Lesbarkeit (Paradox: wirkt im Fließtext eher unruhig)\n**Univers** – Adrian Frutiger, technische Sachlichkeit (Formulare, Beipackzettel)\n**Bodoni** – traditionell, seriös, markant\n\n!!Massimo Vignelli: 4 Schriften reichen einem Grafikdesigner (Garamond, Bodoni, Century, Helvetica)!!',imgs:[]},
    {id:'d04f',icon:'ti-versions',title:'Schriftfamilie, -sippe & Mischen',desc:'**Schriftfamilie:** Schnitte in Breite/Stärke/Lage auf gleicher Grundform (z. B. Univers, Helvetica)\nUrsprüngliche 4 Schnitte: Antiqua, Kursive, Kapitälchen, Halbfette (+später Halbfette Kursive)\n\n**Schriftsippe:** mehrere Schriftfamilien mit gleichen Proportionen/Ober-Unterlängen, kombinierbar (z. B. Thesis, Rotis)\n\n**Schriften mischen:**\n– Max. 2–3 Schriften kombinieren\n– Entweder deutlicher Kontrast (Serif + Grotesk) oder sanfte Ausgeglichenheit (Schriftsippe)\n– Schnitte derselben Familie (bold/italic/condensed) kombinieren optimal\n\n!!Wichtigste Regel der Typografie: Verzerren verboten!!',imgs:[]},
    {id:'d04g',icon:'ti-text-size',title:'Mikrotypografie – Wortbilder & Serifen',desc:'**Serifen** (Endstriche): Haarlinien-Serifen | Grundlinien-Serifen | Keilförmige Serifen – jeweils mit hartem oder weichem Übergang\n\n**Kursiv (Italic):** eigener Schriftschnitt (nie künstlich schräg stellen!) – für Zitate, Namen, Fremdwörter\n**Kapitälchen:** kleine Großbuchstaben in Strichstärke der Kleinbuchstaben – nie normale Großbuchstaben verkleinern\n**Versalien:** GROSSBUCHSTABEN für Betonung/Abkürzung, nicht für Fließtext – 1 Pt kleiner setzen wirkt harmonischer\n\n**Anführungszeichen:**\n– Deutsch „Gänsefüßchen"\n– Französisch (Guillemets) »außen mit Leerzeichen«\n– Deutsch-Guillemets »innen ohne Leerzeichen«\n– Schweizer «außen»\n\n**Ligaturen:** fi, fl, ff – verschmolzene Buchstaben, ästhetisches Detail\n**Eszett (ß):** eigenständiges Zeichen aus gebrochenen Schriften, nur im Deutschen – bei Versalien durch "SS" ersetzen',imgs:[]},
    {id:'d04h',icon:'ti-separator',title:'Trennstriche, Initialen & Zahlen',desc:'**Bindestrich (Divis):** verbindet Wörter (Dipl.-Ing., Rot-Grün-Blau)\n**Gedankenstrich:** länger, trennt/betont (Schwarz – Weiß, 1878–2011, Berlin–Karlsruhe)\n\n**Initialen:** großer Anfangsbuchstabe eines Kapitels – strukturiert & braucht Platz\n\n**Zahlen:** 0–zwölf ausgeschrieben, ab 20 auch als Ziffer möglich\nTausendertrennung in Dreiergruppen (12 000), nicht bei Jahreszahlen\nIBAN: 5×4er + 2er-Gruppe | Datum nach DIN 5008: 2016-06-29\nMajuskelziffern = auf Grundlinie, fallen auf | Minuskelziffern (Mediäval) = mit Ober-/Unterlängen, fügen sich ins Schriftbild',imgs:[]},
    {id:'d04i',icon:'ti-arrows-horizontal',title:'Laufweite, Zeilenabstand & Grauwert',desc:'**Laufweite** = Buchstabenabstand\n– Sperren = vergrößern | Unterschneiden/Kerning = verringern (meist −25 bis −45)\n– Je größer die Schrift, desto enger darf sie gesetzt werden\n\n**Wortabstand:** I-Regel – ein großes "I" sollte zwischen Wörtern Platz haben (≈ 2/3 der x-Höhe)\n\n**Zeilenabstand (Leading):** optimal 120–145 % der Schriftgröße\n– größer = luftiger/heller | kleiner = enger/dunkler\n\n**Grauwert** = Gesamtwirkung einer Seite aus Schriftgröße + Zeilen + Durchschuss\nTipp: Augen zusammenkneifen, um Grauwert-Ungleichgewichte zu erkennen\n\n**Weißraum:** essenziell – mehr Raum um ein Element = mehr Konzentration darauf',imgs:[]},
    {id:'d04j',icon:'ti-align-justified',title:'Schriftausrichtung (Satzarten)',desc:'**Linksbündiger Flattersatz:** Standard für längere Texte, kein Trennungszwang, ausgeglichenes Flattern wirkt einladend\n**Rechtsbündiger Flattersatz:** nur für Bild-Text-Kombinationen, für Fließtext ungeeignet\n**Zentrierter Satz:** Gedichte, Rezepte, Bildunterschriften – nicht für lange Texte\n**Blocksatz:** gleich lange Zeilen, Wortabstände variieren – Vorsicht bei schmalen Spalten (Lücken/Trennungen)\n\n!!Für Fließtext: linksbündiger Flattersatz meist beste Wahl!!\n\n**Blindtexte:** nutzen wenn noch kein finaler Kundentext vorliegt – Sprache & Optik ans Layout anpassen, aber klar als Blindtext erkennbar halten',imgs:[]},
    {id:'d04k',icon:'ti-license',title:'Fontformate & Lizenzen',desc:'**PostScript (PS):** 256 Zeichen, Adobe 1980er, seit 2023 in Creative Cloud nicht mehr unterstützt\n**TrueType (TT):** früherer Standard, oft bei Freefonts, typografisch oft unausgereift\n**OpenType (OT):** heutiger Standard, >65.000 Zeichen möglich (auch nicht-lateinisch), eine Datei, Unicode-basiert → empfohlenes Format\n\n**Open-Source-Schriften:** lizenzfrei, aber oft unvollständige Zeichensätze\n**Freefonts:** gut für kleine Projekte, Lizenz für kommerzielle Nutzung prüfen (dafont.com)\n\n**Fontlizenzen:** Standardlizenz meist für 5 Rechner, unbegrenzte Kundenprojekte erlaubt – Kunde muss Schrift bei Weiterarbeit selbst lizenzieren, Weitergabe verboten',imgs:[]},
  ],
  c05:[
    {id:'d05a',icon:'ti-signature',title:'Zeichen – Grundlagen',desc:'Zeichen bieten Orientierung, Regeln & nonverbale Kommunikation – manche intuitiv verständlich, andere müssen wie Buchstaben erst gelernt werden\nZeichenrepertoire wächst mit dem Alter; Zeichensysteme entwickeln sich ständig weiter (z. B. WLAN-Symbol)\n\n**Geschichte:** Felsmalereien, Kerbhölzer, Hieroglyphen, Geheimschriften seit Menschheitsbeginn; Hieroglyphen = erste systematische Bild-/Symbolschrift; Mittelalter: Stadtwappen\n\n**Zeichen & Kultur/Macht:** manche Zeichencodes nur Eingeweihten zugänglich (z. B. Gauner-Zinken); Zeichen dienen auch repräsentativen/offiziellen Zwecken (z. B. Adler = Stärke/Weitsicht)\n\n**Semiotik** = Lehre der Zeichen – erklärt, wie wir aus Zeichen/Bildern/Wörtern Bedeutung ableiten\n3 Zeichenarten: Icon, Index, Symbol\n\n**Bedeutung für den Gestalter:** nicht sprachgebundene Zeichen (Piktogramme) sind international verständlich, sprachgebundene (Buchstaben) nicht',imgs:[]},
    {id:'d05b',icon:'ti-category',title:'Zeichenklassifikationen',desc:'Optische Zeichen dienen der visuellen Verständigung – 5 Kategorien:\n– **Symbolzeichen:** zeichenhafte Symbole (Peace-Zeichen, Herz)\n– **Signalzeichen:** hinweisend, fordern Reaktion (z. B. Stopp)\n– **Informationszeichen:** wissenschaftlich/technisch standardisiert (Mathematik-Zeichen)\n– **Markenzeichen:** identifizieren Unternehmen/Marken (Logos)\n– **Bilderzeichen:** Piktogramme, Leitsysteme\n\n**Symbolzeichen** zählen zu den ältesten Zeichen der Menschheit (z. B. Weltreligionen, Planetensymbole) & sind weltweit verständlich',imgs:[]},
    {id:'d05c',icon:'ti-map-pin',title:'Piktogramme – Grundlagen',desc:'Piktogramme = nichtsprachliche Zeichen mit abstrahierter Ähnlichkeit zum Bezugsobjekt\nWerden v. a. in öffentlichen Gebäuden & Verkehrsanlagen eingesetzt (international verständlich, unabhängig von Sprache/Bildungsstand)\n\n**Funktionen:** informieren, befehlen (Verbote), suggerieren (Verhalten/Moral)\nWirkung ist immer kontextabhängig (Ort, Höhe, Größe, Beleuchtung)\n\n**Gutes Piktogramm:** intuitiv & schnell erkennbar, schnell erlernbar, kulturneutral, weder zu reduziert noch zu detailreich\nOft Teil des Corporate Designs – muss sich der Gesamterscheinung anpassen',imgs:[]},
    {id:'d05d',icon:'ti-history',title:'Piktogramm-Systeme: ISOTYPE, BLISS, AIGA',desc:'**ISOTYPE** (Otto & Marie Neurath, Gerd Arntz, 1920er Wien): "Wiener Methode der Bildstatistik" – gleich große Piktogramme werden wiederholt statt vergrößert, um Mengen darzustellen; Wahrnehmung über 3 Blicke (wichtigste → weniger wichtige → Detail-Eigenschaften)\n\n**BLISS** (Charles Bliss/Semantography): ca. 2.200 kombinierbare Zeichensymbole, sollte Sprachbarrieren überwinden; Erfolg erst in 1970ern in der Therapie mit Menschen mit Sprachproblemen\n\n**AIGA** (USA, 1970er): 50 standardisierte, kostenfreie Piktogramme für Flughäfen/Bahnhöfe – weltweit meistgenutztes öffentliches Piktogramm-System',imgs:[]},
    {id:'d05e',icon:'ti-medal',title:'Olympische Piktogramme',desc:'1936 Berlin: erstes einheitliches Piktogramm-System (NS-Propaganda-Kontext)\n1964 Tokio (Katsumi Masaru): erstes systematisch entwickeltes System, Mensch im Mittelpunkt – Grundlage fast aller späteren Systeme\n1968 Mexiko: Sportgeräte statt Mensch im Fokus, bunt\n1972 München (**Otl Aicher**): "geometrisches Männchen", streng geometrisches Raster – bahnbrechend, weltweit bis heute gebräuchlich (auch Flughafen Frankfurt)\n1980 Moskau, 1992 Barcelona, 1996 Atlanta, 2000 Sydney: jeweils eigene Stile, bauen auf Tokio/Aicher auf\n\n!!"Steal and modify" – man baut auf Vorhergehendes auf, verbessert & modifiziert es!!',imgs:[]},
    {id:'d05f',icon:'ti-ruler-2',title:'Piktogramme erstellen: Raster & Gestaltung',desc:'**Konzeption:** Kommunikationsziel klären (Funktion, Wirkung, Darstellungsform), dann Gestaltungsprozess: 1. Ideenskizze (abstrahieren/vereinfachen) → 2. Layout/Raster festlegen → 3. Reinzeichnung\n\n**Raster** = unsichtbares, logisches Fundament – Grundlage jedes guten Piktogramm-Systems, muss tragen & trotzdem unsichtbar bleiben\n\n**Figur-Grund-Beziehung:** Hintergrund unterstützt Vordergrund, ist kein aktives Element; Weißraum lenkt Konzentration auf das Piktogramm\n**Schutzräume:** innerer (gleicher Randabstand) & äußerer (Abgrenzung zum Umfeld)\n\n**Farbe:** sparsam einsetzen (1–2 Farben), Rot/Gelb/Blau bereits mit Bedeutung belegt (Verbot/Alarm/Hinweis) – zuerst in S/W entwerfen\n\n!!Ein Piktogramm muss zuallererst in Schwarz-Weiß funktionieren – Effekte machen es selten besser!!',imgs:[]},
    {id:'d05g',icon:'ti-direction-sign',title:'Signaletik & Orientierungssysteme',desc:'**Signaletik** = Fachbegriff für grafische Leitsysteme (Formen, Farben, Typografie, Piktogramme kombiniert)\nPrototyp: Max Burchartz 1927 – jede Farbe symbolisiert ein Stockwerk\n\n**ADV-Flughafensystem** (1969): 5 Farben mit fester Bedeutung – Gelb = Fluggastabfertigung, Rot = Gefahr/Verbot, Grün = Rettung/Fluchtwege, Blau = Transportmittel, Weiß = kommerzielle Infos; Schrift Helvetica\n\n**Lufthansa:** international verständlich, klar, reduziert, zweidimensional – gleicher Stil bei Wegeleit- & Lounge-Beschilderung\n**Deutsche Bahn:** quadratisches Format 66×66 mm, Schutzraum, Schrift "DB Type", Farben Verkehrsweiß/Nachtblau/Verkehrsrot – Teil des Corporate Designs\n\n**Pfeile:** einfachstes & wichtigstes Richtungszeichen – Schaft ca. 1,5× so lang wie Spitze für ausgewogene Wirkung\n**Verkehrszeichen:** rundes Rotes = Verbot (Durchstreichung links oben → rechts unten)',imgs:[]},
    {id:'d05h',icon:'ti-apps',title:'Icons – digitale Piktogramme',desc:'Icons = moderne, digitale Form der Piktogramme – dienen der Orientierung/Navigation im digitalen statt realen Raum, oft mit unterhaltsamem Charakter\nMüssen wie Piktogramme erst gelernt werden; bekanntestes Beispiel: Home-Button-Symbol\n\n**Susan Kare:** Pionierin computerbasierter Icons, entwarf 1984 die Macintosh-Icons\n\n**Grundregeln:** durchgehendes Raster, klare Formensprache, Einfachheit & Prägnanz ("weniger ist mehr")\n**Größen:** meist png, typische Pixelgrößen 16×16, 24×24, 32×32, 64×64, 128×128\n\n!!Icon-Entwicklung ist aufwändig & muss in die Kostenkalkulation eines Auftrags einfließen!!\n\n**Sonderfall Emoji:** Shigetaka Kurita entwarf 1990er in Japan erste 176 Symbole (12×12 px); seit 2010 (Apple) globaler Siegeszug – universelle Sprache für Emotionen & Sprachbarrieren-Überwindung',imgs:[]},
  ],
  c06:[
    {id:'d06a',icon:'ti-layout-grid',title:'Layout – Grundlagen',desc:'**Layout** = optische Anordnung der verschiedenen grafischen Elemente auf einer bestimmten Fläche\n\nLayout = Organisieren & Konkretisieren von visuellen Informationen auf einer zweidimensionalen Fläche.\n\nJedes Layout basiert auf durchdachtem Raster → liefert durchgehende Struktur.\n!!Gutes Layout führt den Leser ohne dass es anstrengend wird!!\n\nAlle visuellen Komponenten (Bilder, Texte & Grafiken) müssen zueinanderpassen & ein stimmiges Gesamtbild formen → nicht nur Anordnen, sondern visuelle Kommunikation in reinster Form\n\n**W-Fragen zum Layout-Aufbau:**\nWER / WAS / WANN / WO & WOMIT / WARUM / WIE / WOZU\n→ Immer auch während des Projekts kontrollierend stellen!',imgs:[]},
    {id:'d06b',icon:'ti-file-description',title:'Format & Papier',desc:'**Format** = Verhältnis von Breite zu Höhe einer Fläche\n!!Format muss vor Layout geklärt sein!!\nErst durch Format können Grafiken, Texte und Bilder angeordnet werden\n\n3 Kategorien: Hochformat | Querformat | Quadratisches Format\nAngabe: Breite × Höhe, z. B. 210 × 297 mm / Hochformat\n\n**DIN-Formate:**\n– A0 = 841×1189 mm = 1 Quadratmeter\n– Alle DIN-Formate: Seitenverhältnis √2\n– Jedes kleinere Format = halbe längere Seite des vorherigen\n– Vergrößerungsfaktor zum nächsten Format: ==141%== | 2 Schritte: 200%\n– Verkleinerungsfaktor: ==71%== | 2 Schritte: 50%\n– DIN-A: Standard | DIN-B: Umschläge, Ordner | DIN-C: Briefumschläge\n\n**Papiergewicht (Grammatur) in g/m²:**\nDünndruckpapier ~40 | Zeitung ~50 | Plakat ~60 | Kunstdruck 90–135\nBriefbogen 80–110 | Postkarte 170 | Broschüre Umschlag 180–400 | Innenseiten 115–170\n\n**Papiersorten:**\nGestrichen = glatt, beschichtet, Farbe besser\nUngestrichen = weicher, Farbe wird stärker aufgesaugt\n\n!!Papier trägt Gestaltung im Wesentlichen – Wahl des Papiers ist entscheidend!!',imgs:[]},
    {id:'d06c',icon:'ti-layout-navbar',title:'Satzspiegel',desc:'**Satzspiegel** = bedruckter Bereich der Grundfläche\n→ legt gleichzeitig Leerraum (Weißraum) fest\n→ garantiert visuelle Einheitlichkeit wenn durchgezogen\n\n!!Grundregel: Vom Groben ins Feine!!\n\nAußerhalb des Satzspiegels: Marginalien, Kolumnentitel, Pagina\n\n**Randproportionen:**\nInnerer Rand (Bundsteg) = schmaler als äußerer Rand\nUnterer Rand (Fußsteg) = größer als oberer Rand (Kopfsteg)\n→ sorgt für ausgewogene Position des Inhalts\n\n**Methoden zur Satzspiegel-Konstruktion:**\n– Freier Satzspiegel: Diagonalkonstruktion (einfachste Methode)\n– Zahlenreihe 2:3:4:5 (harmonisch, gut für DIN-Formate)\n– Goldener Schnitt: 2:3:5:8 (viel Weißraum, klassisch)\n– Fester Satzspiegel: Neunerteilung oder ==Zwölferteilung== (häufig bei Broschüren)\n\n**Pagina** = Seitenzahl, steht zu 99% unterhalb des Satzspiegels\nBei Doppelseite: links = gerade Zahlen | Vorderseite = immer ungerade\n\n**Kolumnentitel**: über dem Text, zusätzliche Orientierung\n– Lebend = ändert sich (Kapitel) | Tot = bleibt gleich (wie Pagina)\n\n**Marginalien** = Kommentare/Hinweise außerhalb des Satzspiegels\nLinks = rechtsbündig | Rechts = linksbündig',imgs:[]},
    {id:'d06d',icon:'ti-layout-columns',title:'Gestaltungsraster',desc:'**Gestaltungsraster** = konsequente Erweiterung des Satzspiegels\n→ teilt ihn in weitere visuelle Einheiten\n\n!!Fehlendes Raster ≠ Kreativität – es erzeugt Orientierungslosigkeit und wirkt chaotisch!!\n\nRaster sorgt für: Komposition, Proportion, Ordnung, Kontinuität und visuelle Sicherheit\n→ erweitert visuelle Möglichkeiten, anstatt sie einzuschränken\n\n**Rasterarten:**\n– **Einspaltiges Raster**: Bücher, Aufsätze – Lesbarkeit im Vordergrund\n– **Zweispaltiges Raster**: Textmengen strukturieren\n  – symmetrisch = Ruhe | asymmetrisch = Spannung\n– **Mehrspaltige Raster**: Magazine, Broschüren, Websites\n  – unbegrenzte Kombinationsmöglichkeiten\n– **Modulraster**: Fläche in gleich große Module aufteilen\n  – Zeitungen, Websites, Tabellen\n– **Grundlinienraster**: exakte horizontale Ausrichtung des Fließtextes\n  – Text auf Vorder- und Rückseite deckungsgleich\n  – bei dünnem Papier (Zeitung) besonders wichtig\n\n==Raster braucht Luft zum Atmen – Weißraum ist kein verschwendeter Platz!==\n\n**Checkliste Gestaltungsraster:**\n1. Format festlegen\n2. Satzspiegel & Ränder definieren\n3. Paginierung & Kolumnentitel setzen\n4. Spalten und Raster festlegen\n5. Bilder & Texte platzieren\n6. Schriftwahl, Schriftgröße, Zeilenabstand\n7. Farbe einsetzen\n8. Grafische Elemente hinzufügen',imgs:[]},
    {id:'d06e',icon:'ti-photo',title:'Layout in der Praxis',desc:'**Gestaltungsphasen:**\n1. Entwurf – analog, visuelle Scribbles auf Papier, 20 schnelle Ideen\n2. Rohlayout (Groblayout) – am Computer, mit Blindtext & Proportionen\n3. Reinlayout – finale Bilder, Mikrotypografie, Rechtschreibung\n4. Prototyp – reales Muster in Originalgröße zum Testen\n\n!!Briefing mit Kunden steht immer zuerst!!\n\n**Text & Bildverhältnis:**\nViel Text → Intellekt wird angesprochen\nViele Bilder → Emotion wird angesprochen\n50/50 = ausgewogenes ruhiges Tempo | 70/30 Bild/Text = mehr Dynamik\n\n**Layout-Stile:**\n– Symmetrie: traditionell, seriös, ruhig, harmonisch\n– Asymmetrie: modern, gewagter, aus Bauhaus-Bewegung (1920er)\n\n**Druckverfahren:**\n– ==Offsetdruck== = wichtigstes Verfahren, hohe Auflagen, CMYK + Sonderfarben\n– Digitaldruck = günstigste Form, Kleinstauflagen, kein Sonderfarben\n– Siebdruck = T-Shirts, Metall, Glas, Volltonfarben möglich\n– Flexodruck = Verpackungen, Massenwaren\n– Tiefdruck = Kataloge, Zeitschriften, sehr hohe Auflagen\n\n**Beschnitt** = Papierrand über Endmaß hinaus\n→ Sicherheit für vollflächige Seiten ohne weißen Rand\n→ Regel: ==mind. 3 mm Beschnitt anlegen==\n\n**PDF-Export:**\nSchriften in Pfade konvertieren! Pfad-Version separat speichern!\nFormat: PDF/X-3 oder PDF/X-1a (ISO-Norm)',imgs:[]},
    {id:'d06f',icon:'ti-news',title:'Editorial Design & Magazin',desc:'**Editorial Design** = Magazindesign\nAnspruchsvolle Aufgabe: Titellogo, Cover, Raster, Schriftwahl, Bildsprache und Detailtypografie müssen zueinander passen\n\n**Magazin-Aufbau:**\n1. Eingangsteil: Editorial, Inhaltsverzeichnis, News, Rubriken\n2. Hauptteil: Leitartikel, Features, Interviews\n3. Schlussteil: Rezensionen, Serviceseiten, Vorschau\n\n**Umschlagseiten:**\nU1 = Cover | U2 = innere Umschlagseite (Seite 2)\nU3 = letzte rechte Umschlagseite | U4 = Rückseite\nU2, U3, U4 = teuerste Anzeigenplätze\n\n**Magazin Cover – 3 Kategorien:**\n– Fotografisches Cover (am häufigsten)\n– Illustratives/abstraktes Cover\n– Typografisches Cover\n\n!!Cover = Gesicht des Magazins – erster Eindruck, Wiedererkennungswert, Zielgruppenansprache!!\n\n**Titelzeilen** (Teaser/Anreißer): links positioniert, beste Sichtbarkeit im Handel\n**Titellogo** = Markenkern, immer gleich, links oben\n\n**Text-Elemente im Magazin:**\n– Headline: größtes typografisches Element, Blickfang\n– Lead (Vorspann): führt zum Fließtext hin\n– Zwischenüberschriften: visuelle Pausen, bessere Orientierung\n– Zitate: meist kursiv, visuelle Auflockerung\n– Kästen & Rahmen: Ordnung & Orientierung, kein Dekor!\n\n**Plakatgestaltung:**\nWird in 2 Schritten wahrgenommen:\n1. Aus Distanz: Blickfang, Reflex des Interesses\n2. Näher: Detailinfos, Kontakthinweise\n==Plakat muss auffällig UND trotzdem lesbar sein!==\n3 Kategorien: Kommerziell | Propaganda | Kunst/Kultur',imgs:[]},
    {id:'d06g',icon:'ti-file-text',title:'Papier vertieft',desc:'**Gestrichenes Papier:** glatt, beschichtet, gibt Farbe besser wieder – Abstufungen: hochglänzend, glänzend, halbmatt, seidenmatt, matt\n**Ungestrichenes Papier:** weicher, unbeschichtet, dicker – Farbe wird stärker aufgesaugt, wirkt schwerer\n\n**ISO 12647 – Papierklassen für Farbwiedergabe im Druck:**\n1 = glänzend gestrichen | 2 = matt gestrichen | 3 = LWC (Light Weight Coated) | 4 = ungestrichen | 5 = ungestrichen gelblich\n\n**Papierformat-Reihen:** DIN-A = Standard | DIN-B = Umschläge/Ordner/Hefter | DIN-C = Verpackungen/Briefumschläge (liegt zwischen A und B, A-Endformate passen genau hinein)\n\n**Laufrichtung:** Papierfasern haben eine Richtung aus der Herstellung – bei Büchern/Magazinen/Broschüren entscheidend für gutes Umblättern; falsche Laufrichtung beeinträchtigt Handhabung\n\n**Ökologie:** Papierverbrauch kostet jährlich Millionen Hektar Wald – verantwortungsvoller Umgang gehört zur Gestalterrolle',imgs:[]},
    {id:'d06h',icon:'ti-printer',title:'Druckverfahren im Detail',desc:'**Offsetdruck (Flachdruck):** wichtigstes Verfahren – Bogen-Offset (kleine Auflagen, Einzelbögen) vs. Rollen-Offset (Endlosbahn, sehr hohe Auflagen wie Zeitungen); große Papierauswahl, CMYK + Sonderfarben möglich\n**Digitaldruck:** günstigste Form für Kleinstauflagen, unpräziser als Offset, keine Sonderfarben\n**Siebdruck:** Schablonentechnik – T-Shirts, Glas, Metall, Volltonfarben oder CMYK\n**Flexodruck:** Massenwaren (Verpackungen, Plastiktüten)\n**Tiefdruck:** hohe Auflagen (Kataloge, Zeitschriften) über Vertiefungen in Druckplatten\n\n**Proof (Prüfdruck) – 3 Arten:**\n– Digitaler Proof: günstig, aber ungenaue Farbwiedergabe\n– Andruck: exakt, da auf Original-Druckmaschine erstellt – aber teuer\n– Monitor-Proof: einfachste, aber unpräziseste Methode\n\n**Ausschießen:** Druckbogen fasst meist 4/8/16/32/64 Seiten – Druckerei ordnet Seiten für späteres Schneiden/Binden; als Gestalter am besten Einzelseiten liefern und das Ausschießen der Druckerei überlassen',imgs:[]},
    {id:'d06i',icon:'ti-poster',title:'Plakatgeschichte & Gestalter',desc:'Plakat = anspruchsvolles Medium: gesamtes gestalterisches Können auf einer Fläche vereint, muss gleichzeitig auffallen UND informieren\n\n**Kommerzielles Plakat:** Werberevolution ab ~1884 (The Beggarstaff Brothers) – radikal einfache, großflächige Gestaltung\nWichtige Vertreter: **Lucian Bernhard** (radikal reduziert, Vorläufer der Pop-Art, z. B. "Priesterzündhölzer" 1903), **Ludwig Hohlwein** (Autodidakt, arbeitete mit Fotovorlagen), Art Deco als kommerzielle Stilrichtung der 1930er\n\n**Propaganda-Plakat:** direkte, brachiale, visuell einfache Botschaften im Eigeninteresse von Staaten/Institutionen\n\n**Kultur-/Kunstplakat:** Ästhetik vor Kommerz – **Alphonse Mucha** (Jugendstil, kommerziell wie künstlerisch erfolgreich), **Henri de Toulouse-Lautrec** (Moulin Rouge)\n\n**Film-/Serienplakat:** z. B. Hans Hillmanns reduziertes S/W-Plakat für "Panzerkreuzer Potemkin" (1966) – Klassiker der Plakatgeschichte',imgs:[]},
    {id:'d06j',icon:'ti-notebook',title:'Magazin-Analyse & Seitenplan',desc:'**Analysefragen für Magazine:** Zielgruppe? Stilmittel/Designsprache? Gewichtung Bild/Text? Dynamisch oder konservativ? Typografie-Einsatz?\n\n**Beispiel Greenpeace Magazin:** werbefrei, finanziert durch Verkauf/Abo, nutzt satirische "Fake-Anzeigen" im Stil echter Werbekampagnen; Blocksatz im Fließtext, Zeilenabstand 1,5 pt, linksbündige Headlines mit farbigen Leads\n\n**Magazine werden nicht linear gelesen** → jede Einzelseite muss für sich visuell überzeugen\nFachpublikation = nüchternes Design | Lifestyle-Magazin = visuell auffälliger, mehr Tempo\nBudget entscheidet: viel Inhalt pro Seite (günstig) vs. viel Weißraum (hochwertig)\n\n**Seitenplan:** grobe Skizze über alle Seiten hinweg (Anzeigen, Artikel, Doppelseiten) – sichert roten Faden & Spannungsbogen vor der Detailausarbeitung\n\n**Redesign nötig, wenn:** Redaktionswechsel, neue Zielgruppen-Definition, neue Marktpositionierung ansteht',imgs:[]},
  ],

  ps:[
    {id:'dps1',icon:'ti-apps',title:'Oberfläche & Navigation',desc:'Menüleiste | Werkzeugleiste (links) | Optionsleiste/Steuerungsbedienfeld | Paletten (Fenster)\n\n**Shortcuts:**\nSTRG+Z – Rückgängig (nur 1×) | STRG+Y – Wiederholen\nSTRG+N – Neu | STRG+S – Speichern | STRG+W – Schließen | STRG+O – Öffnen\n\n**Protokoll-Palette:** letzte 20 Arbeitsschritte, STRG+Z geht nur 1×\n!!Neu gemalt nach Zurückgehen → vorheriger Verlauf ist gelöscht!!\nVorschau-Icon: zurück zum Zustand direkt nach dem Öffnen',imgs:[]},
    {id:'dps2',icon:'ti-vector-triangle',title:'Pixel vs. Vektor',desc:'**PIXEL (Photoshop):**\n– Raster winziger, rechteckiger Punkte, immer rechteckig\n– ideal für fotorealistische Bilder mit feinen Details\n– verliert bei Vergrößerung an Schärfe, braucht viel Speicher\n\n**VEKTOR (Illustrator):**\n– mathematisch definierte Ankerpunkte & Kurven\n– beliebig skalierbar ohne Qualitätsverlust, wenig Speicher\n– kein Fotorealismus, aber scharfe Konturen (Logos, Icons, Diagramme)\n\n**Photoshop-Einsatz:** Bildkorrektur, Bildmontage/Composing, Retusche, Grafiken (Logos besser mit Vektor)',imgs:[]},
    {id:'dps3',icon:'ti-ruler-measure',title:'Bildmaße & Auflösung',desc:'**Bildmaße:** immer in Pixel gemessen – 1 Pixel ist relatives Maß, Größe hängt von Monitor/Auflösung ab\n\n**Bildauflösung:** Pixel pro Fläche – wichtig für Druck (Größe in cm/mm)\n– Bildschirm: meist 72 ppi | Druck: 300 dpi = ca. 118 Pixel/cm\n\n**Beispiel:**\n800×600 px im Druck: 800÷118 = 6,77 cm | 600÷118 = 5,08 cm\n15×10 cm drucken: 15×118 = 1.770 px | 10×118 = 1.180 px nötig\n\n**Farbmodelle:**\n**RGB** (additiv) – Rot/Grün/Blau, 0–255 (8 Bit), für Bildschirme/Kameras – alle voll = weiß\n**CMYK** (subtraktiv) – Cyan/Magenta/Yellow/Black, 0–100%, für Druck – Schwarz separat, da Mischung nur Braun ergibt\n\nppi = Pixel pro Inch | dpi = Dots pro Inch',imgs:[]},
    {id:'dps4',icon:'ti-tools',title:'Werkzeugleiste',desc:'V – Verschieben (Ebenen) | M – Rechteck-Auswahl | Lasso – freihändige Auswahl\nC – Freistellen/Zuschneiden | I – Pipette (Farbe aufnehmen) | B – Pinsel (Größe/Farbe einstellbar)\nT – Text | U – Formen (Vektor, Standard: Rechteck) | H – Hand (Ansicht verschieben, temporär: Leertaste)\nZ – Zoom (ALT = verkleinern, Doppelklick = 100%) | F – Ansichten (Standard/Vollbild+Menü/reiner Vollbildmodus)\n\nVorder-/Hintergrundfarbe: Doppelpfeil tauscht beide, Klick öffnet Farbwähler\nBuntstift-Werkzeug: härtere, schärfere Kanten – meist zum Freistellen',imgs:[]},
    {id:'dps5',icon:'ti-adjustments-horizontal',title:'Bildkorrekturen',desc:'**Helligkeit & Kontrast:** einfachste Methode – jeder Pixel gleichmäßig auf-/abgehellt\n\n**Tonwertkorrektur:** präziser – passt Helligkeit relativ zum Tonwert an, erhält mehr Details\nLinker Regler = dunkle Töne | Mittlerer = Grauwerte | Rechter = helle Töne\n\n**Gradationskurven** (STRG+M): flexibelste Methode, X-Achse = Eingabe, Y-Achse = Ausgabe – komplexer, für Feinanpassungen\n\n**Farbton/Sättigung** (STRG+U): Farbton verändert Farbwert (meist unrealistisch), Sättigung = Buntheit (0 = S/W-Bild)\nHandsymbol-Tool: Bildbereich anklicken → gezielt anpassen\n\n**Farbbalance:** Komplementärfarben-Regler für Tiefen/Mitteltöne/Lichter – entfernt Farbstiche\n\n**Histogramm:** zeigt Helligkeitsverteilung – objektives Kontrollinstrument\n\n⚠ Alles oben ist **destruktiv** (nur über Protokoll rückgängig)\n!!Non-destruktiv: Palette "Korrekturen" → Einstellungsebenen verwenden!!',imgs:[]},
    {id:'dps6',icon:'ti-layers-intersect',title:'Ebenen & Masken',desc:'**Ebenen importieren:** Drag\'n\'Drop, Datei > Platzieren, oder Kopieren (STRG+A/C/V) – Transformationsrahmen mit SHIFT proportional skalieren, ENTER bestätigt\n\n**Hintergrundebene** ist automatisch gesperrt – per Doppelklick entsperren\nSTRG+T = Frei transformieren\n\n**EBENENMASKEN** (non-destruktiv):\n– Weiß = sichtbar | Schwarz = transparent | Grau = teiltransparent\n– Mit Pinsel bemalen (nur Schwarz/Weiß/Grau als Farbe)\n– Löschen: Papierkorb-Icon → Löschen/Abbrechen/Anwenden\n\n**Bildmontage:** 2 Bilder übereinander, sortieren, Maske erstellen – ggf. mit Auswahlwerkzeug (Lasso) vorbereiten\n\n**Schnittmaske:** obere Ebene wird auf Form der unteren zugeschnitten (Rechtsklick > Schnittmaske)\n**Ebenenmodus:** z. B. Multiplizieren = Verrechnung mit unterer Ebene',imgs:[]},
    {id:'dps7',icon:'ti-file-type-jpg',title:'Dateiformate',desc:'**PSD** – behält alle Einstellungen, immer zusätzlich speichern!\n**JPEG** – verlustbehaftet, 70–90% Qualität empfohlen, kein Transparenz, vielseitig (Web + Druck)\n**PNG** – verlustfrei, Transparenz, modernes Webformat\n**TIFF** – wie JPG aber verlustfrei, perfekt für Druck, große Dateigröße\n**GIF** – nur 256 Farben (8 Bit), Transparenz & kleine Animationen möglich\n\nDateigröße hängt ab von: Höhe/Breite (cm), Auflösung, Farbtiefe, Farbmodell (CMYK braucht 4 statt 3 Werte)\n\n**Print:** CMYK, 300 dpi, TIFF/JPEG hoch\n**Web:** RGB, reine Pixelmaße, JPEG/PNG/GIF/WebP',imgs:[]},
    {id:'dps8',icon:'ti-stars',title:'Smartobjekte, Text, Filter & KI',desc:'**Smartobjekte** (nicht-destruktiv): Originalpixel bleiben bei Skalierung erhalten & scharf\n– Erstellen: Reinziehen, Datei > Platzieren, oder Ebene > Smartobjekt > In SO konvertieren\n\n**Text:** Vektorobjekt, beliebig skalierbar, Textrahmen für Fließtext, Zeichen-/Absatz-Palette für Formatierung\n**Ebenenstile ("fx"):** grafische Effekte auf Ebenen anwendbar\n\n**Filter:**\nScharfzeichnen – Unscharf maskieren (größeres Bild = höhere Werte)\nWeichzeichnen – Gaußscher Weichzeichner (z. B. für Hintergründe)\n\n**Generative Füllung (KI):** Auswahl treffen → Begriff eingeben → 3 Varianten → separate Ebene (nicht-destruktiv)\n**Entfernen-Werkzeug:** Objekt rot markieren → KI entfernt es',imgs:[]},
    {id:'dps9',icon:'ti-crop',title:'Auswahl & Bildgröße',desc:'**Auswahlwerkzeug:** grenzt Bearbeitungsbereich ein (gestrichelte Linie) – Pinsel malt nur im Auswahlbereich\n**Lasso:** freihändige Auswahl\nOptionsleiste: Auswahl hinzufügen/abziehen/Schnittmenge bilden\n\n**Bildgröße** (Bild > Bildgröße): skaliert Inhalte mit – Kette = proportional, sonst Verzerrung; Vergrößerung von Pixelbildern = Qualitätsverlust\n**Arbeitsfläche** (Bild > Arbeitsfläche): ändert nur die Maße, Inhalte bleiben unverändert\n**Freistellungswerkzeug:** Bild zuschneiden, mit ENTER bestätigen',imgs:[]},
    {id:'dps10',icon:'ti-device-desktop',title:'Print vs. Web & Destruktiv',desc:'**Destruktiv:** Pixel direkt verändert – nur über Protokoll (letzte 20 Schritte) rückgängig; nur bei kleinen/sicheren Änderungen sinnvoll\n**Nicht-destruktiv:** nur Aussehen verändert, Original bleibt erhalten, mehr Anpassungsmöglichkeiten (Einstellungsebenen)\n\n**Bilder für Druck:** CMYK, 300 dpi, cm/mm, TIFF/JPEG hoch\n**Bilder für Web:** RGB, reine Pixelmaße, JPG/PNG/GIF\n\nSpeichern: STRG+S (Name+Format), regelmäßig zwischenspeichern!',imgs:[]},
  ],
  ai:[
    {id:'dai1',icon:'ti-apps',title:'Illustrator – Oberfläche & Erste Formen',desc:'Aufbau ähnlich Photoshop: Menüleiste, Werkzeugleiste, Optionsleiste, Bedienfelder (Paletten)\n\n**Erste Vektorformen:** Rechteck/Ellipse/Polygon-Werkzeuge – Grundformen als Basis für komplexere Objekte\nZeichenflächen-Werkzeug (SHIFT+O): mehrere Formate in einem Dokument, jede Fläche separat exportierbar',imgs:[]},
    {id:'dai2',icon:'ti-vector',title:'Pixel vs. Vektor',desc:'**Pixel (Photoshop):** Raster winziger Punkte, ideal für Fotorealismus, verliert bei Vergrößerung Schärfe\n**Vektor (Illustrator):** mathematisch definierte Ankerpunkte & Kurven, beliebig skalierbar ohne Qualitätsverlust, wenig Speicher – ideal für Logos, Icons, Diagramme',imgs:[]},
