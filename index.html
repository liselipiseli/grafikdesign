let curArea='kurs', mCtx='kurs', editId=null, editKey=null, curDetail=null;

function ls(){try{return JSON.parse(localStorage.getItem('gd4')||'{}')}catch{return{}}}
function ss(s){localStorage.setItem('gd4',JSON.stringify(s))}
function getCards(k){const s=ls();return s.cards&&s.cards[k]?s.cards[k]:(DC[k]||[])}
function setCards(k,v){const s=ls();if(!s.cards)s.cards={};s.cards[k]=v;ss(s)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Mini-Markdown renderer für Kartenbeschreibungen
function fmt(s){
  return esc(s)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/==(.+?)==/g,'<span class="hl-mint">$1</span>')
    .replace(/!!(.+?)!!/g,'<span class="hl-blue">$1</span>')
    .replace(/__(.+?)__/g,'<u>$1</u>')
    .replace(/~~(.+?)~~/g,'<s>$1</s>');
}

function cardHTML(card,key){
  const tc=TAG[key]||'t01', tl=TL(key)||'';
  const imgs=Array.isArray(card.imgs)?card.imgs:[];
  const imgBlocks=imgs.filter(i=>i&&i.url).map(i=>`
    <div class="card-img-block">
      <img src="${esc(i.url)}" alt="${esc(i.caption||'')}" loading="lazy" onerror="this.parentElement.style.display='none'">
      ${i.caption?`<div class="card-img-caption">${esc(i.caption)}</div>`:''}
    </div>`).join('');
  return `<div class="card" id="cd-${card.id}">
    <div class="card-main">
      <span class="card-tag ${tc}">${esc(tl)}</span>
      <div class="card-title"><i class="ti ${card.icon||'ti-file'}" aria-hidden="true" style="font-size:14px;opacity:.55"></i>${esc(card.title)}</div>
      <div class="card-desc">${fmt(card.desc)}</div>
    </div>
    ${imgBlocks}
    <div class="card-foot">
      <button class="foot-btn" onclick="openEdit('${key}','${card.id}')"><i class="ti ti-pencil" aria-hidden="true"></i> Bearbeiten</button>
      <button class="foot-btn del" onclick="delCard('${key}','${card.id}')"><i class="ti ti-trash" aria-hidden="true"></i> Löschen</button>
    </div>
  </div>`;
}

function emptyHTML(){return'<div class="empty" style="grid-column:1/-1"><i class="ti ti-cards"></i>Noch keine Karten</div>'}

// ── Kapitel-Liste (Übersicht) ────────────────────────────────────────────────
function chapterRow(c,cards,key){
  return `<div class="chapter" id="ch-${key}">
    <div class="chapter-head" onclick="openChapter('${key}')">
      <span class="chapter-num">${esc(c.n||'')}</span>
      <span class="chapter-name">${esc(c.t||AP[key]||key)}</span>
      <span class="chapter-count" id="cnt-${key}">${cards.length} Karten</span>
      <i class="ti ti-chevron-right chevron" aria-hidden="true"></i>
    </div>
  </div>`;
}

function renderKurs(){document.getElementById('kursView').innerHTML=CH.map(c=>chapterRow(c,getCards(c.id),c.id)).join('')}
function renderAdobeList(){
  document.getElementById('adobeView').innerHTML=Object.keys(AP).map(k=>chapterRow({n:'',t:AP[k]},getCards(k),k)).join('');
}

// ── Kapitel-Detailseite ───────────────────────────────────────────────────────
function renderDetail(){
  const key=curDetail;
  if(!key)return;
  const c=CH.find(x=>x.id===key);
  const title=c?`${c.n} – ${c.t}`:(AP[key]||key);
  const cards=getCards(key);
  document.getElementById('detailView').innerHTML=`
    <div class="detail-head">
      <button class="back-btn" onclick="closeChapter()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Zurück</button>
      <div class="detail-title">${esc(title)}</div>
      <span class="detail-count">${cards.length} Karten</span>
    </div>
    <div class="cards" id="cards-${key}">${cards.map(cd=>cardHTML(cd,key)).join('')||emptyHTML()}</div>
    <button class="add-btn" onclick="openAdd('${key}')"><i class="ti ti-plus" aria-hidden="true"></i> Karte hinzufügen</button>`;
}

function openChapter(key){
  curDetail=key;
  renderDetail();
  document.getElementById('listWrap').style.display='none';
  document.getElementById('detailView').style.display='';
  window.scrollTo(0,0);
}

function closeChapter(){
  const key=curDetail;
  curDetail=null;
  document.getElementById('detailView').style.display='none';
  document.getElementById('listWrap').style.display='';
  if(key){
    const isKurs=key.startsWith('c');
    curArea=isKurs?'kurs':'adobe';
    document.querySelectorAll('.area-switch button').forEach((b,i)=>b.classList.toggle('active',(i===0)===isKurs));
    document.getElementById('kursView').style.display=isKurs?'':'none';
    document.getElementById('adobeView').style.display=isKurs?'none':'';
  }
  renderKurs();
  renderAdobeList();
  window.scrollTo(0,0);
}

function switchArea(a,btn){
  curArea=a;
  document.querySelectorAll('.area-switch button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('kursView').style.display=a==='kurs'?'':'none';
  document.getElementById('adobeView').style.display=a==='adobe'?'':'none';
  clearSearch();
  if(a==='adobe')renderAdobeList();
}

function reRender(key){
  const cards=getCards(key);
  const g=document.getElementById('cards-'+key);
  const cnt=document.getElementById('cnt-'+key);
  if(g)g.innerHTML=cards.map(cd=>cardHTML(cd,key)).join('')||emptyHTML();
  if(cnt)cnt.textContent=cards.length+' Karten';
  const dc=document.querySelector('#detailView .detail-count');
  if(curDetail===key&&dc)dc.textContent=cards.length+' Karten';
}
function delCard(key,id){
  if(!confirm('Karte löschen?'))return;
  setCards(key,getCards(key).filter(c=>c.id!==id));
  reRender(key);
}

// ── Modal ──────────────────────────────────────────────────────────────────
function resetModal(){
  document.getElementById('fT').value='';
  document.getElementById('fD').value='';
  document.getElementById('fI').value='ti-file';
  document.getElementById('imgEntries').innerHTML='';
}
function addImgRow(url='',caption=''){
  const row=document.createElement('div');
  row.className='img-row';
  row.innerHTML=`<div style="flex:1;display:flex;flex-direction:column;gap:4px">
    <input class="fi" type="text" placeholder="https://… (Bild-URL)" value="${esc(url)}">
    <input class="fi" type="text" placeholder="Bildunterschrift (optional)" value="${esc(caption)}">
  </div>
  <button type="button" class="img-del" onclick="this.parentElement.remove()"><i class="ti ti-x" aria-hidden="true"></i></button>`;
  document.getElementById('imgEntries').appendChild(row);
}
function getImgRows(){
  return [...document.getElementById('imgEntries').querySelectorAll('.img-row')].map(row=>{
    const ins=row.querySelectorAll('input');
    return {url:(ins[0]?.value||'').trim(),caption:(ins[1]?.value||'').trim()};
  }).filter(i=>i.url);
}

function openAdd(key){
  editId=null; editKey=key; mCtx=key.startsWith('c')?'kurs':'adobe';
  resetModal();
  const fcg=document.getElementById('fCG');
  if(mCtx==='kurs'){
    fcg.style.display='';
    document.getElementById('fC').innerHTML=CH.map(c=>`<option value="${c.id}" ${c.id===key?'selected':''}>${c.n} – ${c.t}</option>`).join('');
    document.getElementById('mTitle').textContent='Neue Karte';
  } else {
    fcg.style.display='none';
    document.getElementById('mTitle').textContent=`Neue Karte – Adobe ${AP[key]}`;
  }
  document.getElementById('backdrop').classList.add('open');
  setTimeout(()=>document.getElementById('fT').focus(),50);
}

function openEdit(key,id){
  const card=getCards(key).find(c=>c.id===id);
  if(!card)return;
  editId=id; editKey=key; mCtx=key.startsWith('c')?'kurs':'adobe';
  resetModal();
  document.getElementById('fT').value=card.title||'';
  document.getElementById('fD').value=card.desc||'';
  document.getElementById('fI').value=card.icon||'ti-file';
  (Array.isArray(card.imgs)?card.imgs:[]).filter(i=>i&&i.url).forEach(i=>addImgRow(i.url,i.caption||''));
  const fcg=document.getElementById('fCG');
  if(mCtx==='kurs'){
    fcg.style.display='';
    document.getElementById('fC').innerHTML=CH.map(c=>`<option value="${c.id}" ${c.id===key?'selected':''}>${c.n} – ${c.t}</option>`).join('');
    document.getElementById('mTitle').textContent='Karte bearbeiten';
  } else {
    fcg.style.display='none';
    document.getElementById('mTitle').textContent=`Karte bearbeiten – Adobe ${AP[key]}`;
  }
  document.getElementById('backdrop').classList.add('open');
  setTimeout(()=>document.getElementById('fT').focus(),50);
}

function closeModal(){document.getElementById('backdrop').classList.remove('open')}
function closeOut(e){if(e.target===document.getElementById('backdrop'))closeModal()}

function saveCard(){
  const title=document.getElementById('fT').value.trim();
  const desc=document.getElementById('fD').value.trim();
  if(!title||!desc){alert('Bitte Titel und Beschreibung ausfüllen.');return}
  const icon=document.getElementById('fI').value.trim()||'ti-file';
  const imgs=getImgRows();
  const key=mCtx==='kurs'?document.getElementById('fC').value:editKey;
  if(editId){
    // update existing
    const cards=getCards(editKey).map(c=>c.id===editId?{...c,title,desc,icon,imgs}:c);
    setCards(editKey,cards);
    closeModal();
    reRender(editKey);
  } else {
    const card={id:'u'+Date.now(),icon,title,desc,imgs};
    setCards(key,[...getCards(key),card]);
    closeModal();
    reRender(key);
  }
}

// ── Search ─────────────────────────────────────────────────────────────────
function allCards(){
  const out=[];
  CH.forEach(c=>getCards(c.id).forEach(cd=>out.push({cd,key:c.id})));
  Object.keys(AP).forEach(k=>getCards(k).forEach(cd=>out.push({cd,key:k})));
  return out;
}
function doSearch(q){
  const sv=document.getElementById('searchView'),mv=document.getElementById('mainView');
  if(!q.trim()){sv.style.display='none';mv.style.display='';return}
  sv.style.display='';mv.style.display='none';
  const res=allCards().filter(({cd})=>(cd.title+cd.desc).toLowerCase().includes(q.toLowerCase()));
  document.getElementById('searchLabel').textContent=`${res.length} Ergebnis${res.length!==1?'se':''} für „${q}"`;
  const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  const hi=t=>esc(t).replace(re,'<span class="highlight">$1</span>');
  document.getElementById('searchCards').innerHTML=res.length
    ?res.map(({cd,key})=>{
      const tc=TAG[key]||'t01',tl=TL(key)||'';
      const imgs=Array.isArray(cd.imgs)?cd.imgs:[];
      const imgB=imgs.filter(i=>i&&i.url).map(i=>`<div class="card-img-block"><img src="${esc(i.url)}" alt="${esc(i.caption||'')}" loading="lazy" onerror="this.parentElement.style.display='none'">${i.caption?`<div class="card-img-caption">${esc(i.caption)}</div>`:''}</div>`).join('');
      return `<div class="card"><div class="card-main"><span class="card-tag ${tc}">${esc(tl)}</span><div class="card-title"><i class="ti ${cd.icon||'ti-file'}" aria-hidden="true" style="font-size:14px;opacity:.55"></i>${hi(cd.title)}</div><div class="card-desc">${fmt(cd.desc)}</div></div>${imgB}</div>`;
    }).join('')
    :'<div class="empty"><i class="ti ti-search-off"></i>Nichts gefunden.</div>';
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('searchView').style.display='none';
  document.getElementById('mainView').style.display='';
}

// ── Drucken ────────────────────────────────────────────────────────────────
function printCurrentView(){
  // Falls gerade gesucht wird, zurück zur normalen Ansicht wechseln
  if(document.getElementById('searchView').style.display!=='none')clearSearch();
  window.print();
}

renderKurs();
</script>
